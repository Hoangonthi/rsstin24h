name: RSS Collector

on:
  schedule:
    - cron: "*/6 * * * *"
  workflow_dispatch:

concurrency:
  group: rss-collector
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  collect:
    name: Collect latest RSS news
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      WATCHER_MAX_ITEMS: "20"
      WATCHER_CATEGORY_BASE_MINUTES: "6"
      WATCHER_FETCH_TIMEOUT_MS: "12000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${FIREBASE_PROJECT_ID:-}" ]; then
            echo "::error::Missing GitHub Secret FIREBASE_PROJECT_ID"
            exit 1
          fi
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "::error::Missing GitHub Secret FIREBASE_SERVICE_ACCOUNT_JSON"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run RSS collector
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::RSS collector"
          npm run rss
          echo "::endgroup::"
