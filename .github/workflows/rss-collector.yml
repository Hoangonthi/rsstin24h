name: RSS Collector

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: rss-collector
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rss:
    name: Collect latest RSS news
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_AUTO_PUSH_ENABLED: "true"
      TELEGRAM_AUTO_MAX_NEWS: "120"
      TELEGRAM_AUTO_MAX_PUSHES: "2"
      WATCHER_MAX_ITEMS: "20"
      WATCHER_CATEGORY_BASE_MINUTES: "6"
      WATCHER_FETCH_TIMEOUT_MS: "12000"
      WATCHER_ONCE_ROUNDS: "5"
      WATCHER_ONCE_TIME_BUDGET_MS: "540000"
      WATCHER_ONCE_ROUND_DELAY_MS: "1000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${FIREBASE_PROJECT_ID:-}" ]; then
            echo "::error::Missing GitHub Secret FIREBASE_PROJECT_ID"
            exit 1
          fi
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "::error::Missing GitHub Secret FIREBASE_SERVICE_ACCOUNT_JSON"
            exit 1
          fi
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ]; then
            echo "::error::Missing GitHub Secret TELEGRAM_BOT_TOKEN"
            exit 1
          fi

      - name: Install deps
        run: npm ci

      - name: Run RSS collector
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::RSS collector"
          npm run rss
          echo "::endgroup::"

      - name: Auto push Telegram
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          echo "::group::Telegram auto push"
          node scripts/telegram-auto-push-actions.js
          echo "::endgroup::"
