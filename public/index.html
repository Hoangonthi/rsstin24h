<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Broker News Dashboard</title>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #111827;
      --border: rgba(148, 163, 184, 0.22);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --hot: #fb7185;
      --important: #f59e0b;
      --watch: #a78bfa;
      --risk: #f97316;
      --ok: #22c55e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 18px;
      overflow-x: hidden;
    }

    .shell { max-width: 1440px; min-width: 0; margin: 0 auto; }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    h1 { margin: 0; font-size: 1.7rem; line-height: 1.15; letter-spacing: 0; }
    h2 { margin: 0 0 10px; font-size: 1.05rem; letter-spacing: 0; }

    .subtext,
    .status,
    .meta,
    .summary,
    .score-row,
    .advisory-note,
    .empty {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.45;
    }

    .subtext { margin: 5px 0 0; font-size: 0.9rem; }
    .status { text-align: right; font-size: 0.9rem; }

    .summary-grid {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      min-width: 0;
    }

    .news-item,
    .bulletin-panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(17, 24, 39, 0.92);
    }

    .summary-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 28px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.76);
      color: #cbd5e1;
      padding: 4px 9px;
      font-size: 0.78rem;
      line-height: 1.2;
      white-space: nowrap;
    }

    button.summary-pill {
      cursor: pointer;
    }

    .summary-pill strong {
      color: #f8fafc;
      font-weight: 850;
    }

    .summary-pill.info { border-color: rgba(56, 189, 248, 0.24); background: rgba(14, 116, 144, 0.12); }
    .summary-pill.hot { border-color: rgba(245, 158, 11, 0.38); background: rgba(245, 158, 11, 0.13); color: #fde68a; }
    .summary-pill.risk { border-color: rgba(248, 113, 113, 0.42); background: rgba(239, 68, 68, 0.14); color: #fecaca; }
    .summary-pill.good { border-color: rgba(34, 197, 94, 0.32); background: rgba(34, 197, 94, 0.11); color: #bbf7d0; }
    .summary-pill.active {
      border-color: rgba(56, 189, 248, 0.88);
      background: rgba(56, 189, 248, 0.22);
      color: #f0f9ff;
      box-shadow: inset 0 0 0 1px rgba(125, 211, 252, 0.18);
    }

    .controls,
    .filters,
    .action-row,
    .bulletin-actions,
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 100%;
      overflow: hidden;
    }

    .toolbar {
      align-items: center;
      margin-bottom: 10px;
    }

    .toolbar.filters {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) max-content max-content;
      align-items: center;
      overflow: visible;
    }

    .toolbar.filters .advanced-filter {
      display: none;
    }

    .search-wrap {
      position: relative;
      min-width: 0;
    }

    .search-wrap input {
      padding-right: 34px;
    }

    .clear-search {
      position: absolute;
      top: 50%;
      right: 6px;
      width: 24px;
      min-width: 24px;
      min-height: 24px;
      height: 24px;
      transform: translateY(-50%);
      border-radius: 999px;
      padding: 0;
      color: #cbd5e1;
      background: rgba(15, 23, 42, 0.9);
    }

    .clear-search[hidden] {
      display: none;
    }

    .reset-filters {
      min-height: 34px;
      border-color: rgba(248, 113, 113, 0.38);
      background: rgba(127, 29, 29, 0.18);
      color: #fecaca;
      white-space: nowrap;
    }

    .bulletin-actions {
      justify-content: flex-end;
      margin-bottom: 12px;
    }

    .controls > *,
    .filters > *,
    .action-row > *,
    .bulletin-actions > *,
    .toolbar > * {
      min-width: 0;
    }

    button,
    input,
    select {
      max-width: 100%;
      min-height: 34px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      padding: 0 10px;
      font: inherit;
      font-size: 0.88rem;
    }

    button { cursor: pointer; }
    button.active { border-color: rgba(56, 189, 248, 0.72); background: rgba(56, 189, 248, 0.16); color: #e0f2fe; }
    button:disabled { cursor: not-allowed; opacity: 0.55; }
    .primary-action { border-color: rgba(56, 189, 248, 0.55); background: rgba(56, 189, 248, 0.12); }
    input, select { width: 100%; }
    .toolbar button { flex: 0 1 auto; }
    .toolbar input,
    .toolbar select { flex: 1 1 150px; width: auto; }
    .toolbar.filters input,
    .toolbar.filters select,
    .toolbar.filters .toggle {
      width: 100%;
      min-width: 0;
    }
    option { background: #111827; color: var(--text); }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      padding: 0 10px;
      font-size: 0.86rem;
      white-space: nowrap;
    }

    .toggle input { width: auto; min-height: auto; margin: 0; }

    .intel-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 12px;
      align-items: flex-start;
      overflow: hidden;
      padding-bottom: 6px;
      margin-bottom: 8px;
      max-width: 100%;
      min-width: 0;
      white-space: normal;
    }

    .intel-tabs.is-collapsed {
      max-height: 118px;
    }

    .intel-tab-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      min-width: 0;
      width: 100%;
    }

    .intel-tab-group.is-secondary {
      padding-top: 2px;
      border-top: 1px solid rgba(148, 163, 184, 0.1);
    }

    .intel-tab-heading {
      flex: 0 0 100%;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 850;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .intel-tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 1 auto;
      max-width: 184px;
      min-width: 0;
      min-height: 27px;
      border-radius: 999px;
      padding: 0 7px 0 9px;
      font-size: 0.78rem;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .intel-tab > span:first-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .intel-tab.active {
      border-color: rgba(56, 189, 248, 0.95);
      background: rgba(56, 189, 248, 0.24);
      color: #f0f9ff;
      box-shadow: inset 0 0 0 1px rgba(125, 211, 252, 0.2);
    }

    .chip-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 17px;
      margin-left: 5px;
      border-radius: 999px;
      padding: 0 5px;
      color: #dbeafe;
      background: rgba(59, 130, 246, 0.24);
      font-size: 0.68rem;
      font-weight: 850;
    }
    .chip-count.low { color: #bbf7d0; background: rgba(34, 197, 94, 0.18); }
    .chip-count.medium { color: #fde68a; background: rgba(245, 158, 11, 0.2); }
    .chip-count.high { color: #fecaca; background: rgba(239, 68, 68, 0.24); }

    .tabs-actions {
      display: flex;
      justify-content: flex-start;
      margin: -2px 0 10px;
    }

    .tabs-toggle {
      min-height: 26px;
      border-radius: 999px;
      padding: 0 10px;
      color: #bae6fd;
      border-color: rgba(56, 189, 248, 0.35);
      background: rgba(8, 47, 73, 0.28);
      font-size: 0.78rem;
    }

    .intel-dashboard {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 10px;
      min-width: 0;
    }

    .intel-panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(17, 24, 39, 0.92);
      padding: 10px;
      min-width: 0;
    }

    .intel-panel h2 {
      margin: 0 0 8px;
      color: #cbd5e1;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .heatmap-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 6px;
    }

    .heat-cell,
    .ticker-cell,
    .live-row {
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.035);
      padding: 7px 8px;
      min-width: 0;
    }

    .heat-cell.hot { border-color: rgba(248, 113, 113, 0.5); background: rgba(239, 68, 68, 0.12); }
    .heat-cell.watch { border-color: rgba(245, 158, 11, 0.45); background: rgba(245, 158, 11, 0.1); }
    .heat-cell.good { border-color: rgba(34, 197, 94, 0.42); background: rgba(34, 197, 94, 0.09); }
    .heat-label { color: #e5e7eb; font-size: 0.78rem; font-weight: 800; }
    .heat-meta { margin-top: 2px; color: var(--muted); font-size: 0.72rem; }

    .ticker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 6px;
    }

    .ticker-cell strong { color: #86efac; font-size: 0.84rem; }
    .ticker-cell span { float: right; color: #e5e7eb; font-size: 0.76rem; font-weight: 800; }
    .ticker-cell div { margin-top: 3px; color: var(--muted); font-size: 0.72rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .live-ticker {
      display: grid;
      gap: 5px;
      max-height: 224px;
      overflow: auto;
    }

    .live-row {
      display: grid;
      grid-template-columns: max-content 1fr max-content;
      gap: 7px;
      align-items: center;
      font-size: 0.76rem;
    }

    .live-row strong { color: #93c5fd; }
    .live-row span { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .live-row em { color: var(--muted); font-style: normal; }

    .timeline-row {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr) max-content;
      gap: 8px;
      align-items: baseline;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 6px;
      background: rgba(15, 23, 42, 0.58);
      padding: 7px 9px;
      font-size: 0.82rem;
    }
    .timeline-row time { color: #7dd3fc; font-weight: 850; }
    .timeline-row a { color: #e5e7eb; text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .timeline-row a:hover { text-decoration: underline; }
    .timeline-row span { color: var(--muted); font-size: 0.74rem; white-space: nowrap; }

    .news-list { display: grid; gap: 6px; }
    .news-item { padding: 7px 10px; }
    .news-item:hover { border-color: rgba(56, 189, 248, 0.38); background: rgba(17, 24, 39, 0.98); }

    .load-more-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 46px;
      margin: 10px 0 4px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .load-more-row[hidden] {
      display: none;
    }

    .load-more-button {
      min-height: 32px;
      border-color: rgba(56, 189, 248, 0.34);
      background: rgba(14, 116, 144, 0.14);
      color: #bae6fd;
      font-size: 0.82rem;
    }

    .load-more-status {
      min-width: 72px;
      text-align: left;
    }

    .new-news-notice {
      position: sticky;
      top: 8px;
      z-index: 20;
      display: flex;
      justify-content: center;
      margin: 0 0 8px;
      pointer-events: none;
    }

    .new-news-notice[hidden] {
      display: none;
    }

    .new-news-notice button {
      pointer-events: auto;
      min-height: 30px;
      border-color: rgba(34, 197, 94, 0.42);
      background: rgba(20, 83, 45, 0.88);
      color: #dcfce7;
      font-size: 0.82rem;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28);
    }
    .news-main { position: relative; padding-right: 62px; }
    .title-row {
      display: flex;
      align-items: baseline;
      gap: 7px;
      min-width: 0;
    }
    .ticker-badge {
      flex: 0 0 auto;
      border: 1px solid rgba(34, 197, 94, 0.48);
      border-radius: 5px;
      background: rgba(34, 197, 94, 0.11);
      color: #86efac;
      padding: 1px 5px;
      font-size: 0.73rem;
      line-height: 1.35;
      font-weight: 850;
    }
    .title {
      min-width: 0;
      color: #e5e7eb;
      font-weight: 680;
      font-size: 0.95rem;
      line-height: 1.35;
      text-decoration: none;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .title-source-time {
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }
    .title-main { color: #f8fafc; }
    .title:hover { text-decoration: underline; }
    .meta { margin-top: 3px; }
    .summary { margin-top: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .tag-row, .score-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }

    .badge {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      color: #cbd5e1;
      padding: 2px 6px;
      font-size: 0.72rem;
      line-height: 1.25;
    }

    .badge.hot { color: var(--hot); border-color: rgba(251, 113, 133, 0.58); }
    .badge.important { color: var(--important); border-color: rgba(245, 158, 11, 0.58); }
    .badge.watch { color: var(--watch); border-color: rgba(167, 139, 250, 0.58); }
    .badge.risk, .badge.panic, .badge.risk_off { color: var(--risk); border-color: rgba(249, 115, 22, 0.58); }
    .badge.good, .badge.strong, .badge.bullish, .badge.risk_on { color: var(--ok); border-color: rgba(34, 197, 94, 0.5); }

    .score-stack {
      position: absolute;
      top: 0;
      right: 0;
      display: grid;
      justify-items: stretch;
      gap: 2px;
      width: 54px;
    }
    .report-badge {
      flex: 0 0 auto;
      border: 1px solid rgba(125, 211, 252, 0.34);
      border-radius: 5px;
      background: rgba(14, 116, 144, 0.12);
      color: #bae6fd;
      padding: 1px 5px;
      font-size: 0.72rem;
      line-height: 1.35;
      font-weight: 850;
    }

    .score-badge {
      min-width: 0;
      border: 1px solid rgba(148, 163, 184, 0.26);
      border-radius: 6px;
      padding: 2px 4px;
      text-align: center;
      font-size: 0.68rem;
      line-height: 1.1;
      font-weight: 850;
      color: #bbf7d0;
      background: rgba(34, 197, 94, 0.12);
    }
    .score-badge.hot {
      color: #fecaca;
      border-color: rgba(248, 113, 113, 0.56);
      background: rgba(239, 68, 68, 0.16);
    }
    .score-badge.watch {
      color: #fde68a;
      border-color: rgba(245, 158, 11, 0.52);
      background: rgba(245, 158, 11, 0.14);
    }
    .dup-badge {
      display: inline-flex;
      align-items: center;
      margin-left: 5px;
      border: 1px solid rgba(56, 189, 248, 0.32);
      border-radius: 5px;
      color: #7dd3fc;
      background: rgba(56, 189, 248, 0.08);
      padding: 1px 5px;
      font-size: 0.7rem;
      font-weight: 800;
      white-space: nowrap;
    }
    .source-action {
      color: #7dd3fc;
      font-size: 0.78rem;
      font-weight: 750;
      text-decoration: none;
    }
    .source-action:hover { text-decoration: underline; }

    .detail-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 20px;
      border-radius: 5px;
      padding: 0 4px;
      color: #94a3b8;
      border-color: rgba(148, 163, 184, 0.16);
      background: rgba(15, 23, 42, 0.48);
      font-size: 0.64rem;
      font-weight: 750;
      line-height: 1.05;
      white-space: nowrap;
      text-align: center;
    }

    .detail-action:hover {
      border-color: rgba(56, 189, 248, 0.38);
      color: #bae6fd;
      background: rgba(8, 47, 73, 0.32);
    }

    .stream-filters {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(140px, 0.7fr) minmax(140px, 0.7fr) minmax(170px, 0.8fr);
      gap: 10px;
      align-items: start;
      margin: 10px 0 8px;
      min-width: 0;
    }

    .stream-filter-group {
      min-width: 0;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.5);
      padding: 7px;
    }

    .stream-filter-label {
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .letter-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      min-width: 0;
    }

    .letter-filter button {
      min-height: 24px;
      min-width: 24px;
      border-radius: 5px;
      padding: 0 6px;
      font-size: 0.72rem;
      line-height: 1;
    }

    .letter-filter button[data-letter="all"] {
      min-width: 48px;
    }

    .stream-filter-group select {
      min-height: 30px;
      font-size: 0.8rem;
      background: rgba(255, 255, 255, 0.045);
    }

    .active-filter-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      margin: 0 0 9px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .active-filter-bar[hidden] {
      display: none;
    }

    .active-filter-label {
      font-weight: 750;
      color: #cbd5e1;
    }

    .active-filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 25px;
      border: 1px solid rgba(56, 189, 248, 0.26);
      border-radius: 999px;
      background: rgba(8, 47, 73, 0.3);
      color: #dbeafe;
      padding: 0 7px 0 9px;
      font-size: 0.75rem;
      white-space: nowrap;
    }

    .active-filter-chip button {
      width: 18px;
      min-width: 18px;
      height: 18px;
      min-height: 18px;
      border-radius: 999px;
      padding: 0;
      color: #bae6fd;
      background: rgba(15, 23, 42, 0.8);
      line-height: 1;
    }

    .active-filter-reset {
      min-height: 25px;
      border-radius: 999px;
      padding: 0 9px;
      color: #fecaca;
      border-color: rgba(248, 113, 113, 0.34);
      background: rgba(127, 29, 29, 0.16);
      font-size: 0.75rem;
    }
    .advisory-note { margin-top: 7px; color: #cbd5e1; }

    .legal-disclaimer {
      margin: 14px 0 4px;
      color: var(--muted);
      font-size: 0.74rem;
      line-height: 1.45;
      text-align: center;
    }

    .detail-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(2, 6, 23, 0.72);
    }

    .detail-backdrop.visible { display: flex; }

    .detail-modal {
      width: min(860px, 100%);
      max-height: min(760px, 92vh);
      overflow: auto;
      border: 1px solid rgba(148, 163, 184, 0.32);
      border-radius: 8px;
      background: #0b1020;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
    }

    .detail-head {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 12px;

    function toDate(value) {
      if (!value) return null;
      if (typeof value.toDate === "function") return value.toDate();
      if (Number.isFinite(value.seconds)) return new Date(value.seconds * 1000 + Math.floor((value.nanoseconds || 0) / 1000000));
      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function toCacheDate(value) {
      const date = toDate(value);
      return date ? date.toISOString() : null;
    }

    function formatTime(value) {
      const date = toDate(value);
      if (!date) return "Chưa rõ thời gian";
      return date.toLocaleString("vi-VN", {
        hour: "2-digit",
        minute: "2-digit",
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
      });
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function stripHtml(value) {
      const div = document.createElement("div");
      div.innerHTML = String(value || "");
      return (div.textContent || div.innerText || "").replace(/\s+/g, " ").trim();
    }

    function legalSummary(value) {
      const clean = String(value || "").replace(/\s+/g, " ").trim();
      if (clean.length <= 300) return clean;
      return `${clean.slice(0, 299).trimEnd()}…`;
    }

    const HSX_PUBLIC_URL = "https://www.hsx.vn/";

    function isHsxSource(item) {
      const sourceText = String(item.source || item.sourceName || "").toLowerCase();
      return sourceText.includes("hose") || sourceText.includes("hsx");
    }

    function isHsxApiUrl(url) {
      try {
        const parsed = new URL(String(url || ""));
        const host = parsed.hostname.toLowerCase();
        const path = parsed.pathname.toLowerCase();
        return host === "api.hsx.vn" || (host.endsWith("hsx.vn") && path.includes("/api/"));
      } catch (error) {
        return false;
      }
    }

    function toPublicHsxUrl(rawUrl) {
      try {
        const parsed = new URL(String(rawUrl || ""));
        if (parsed.hostname.toLowerCase() === "api.hsx.vn" && parsed.pathname.toLowerCase().startsWith("/tin-tuc/")) {
          parsed.hostname = "www.hsx.vn";
          return parsed.href;
        }
      } catch (error) {
        return "";
      }
      return "";
    }

    function isFeedUrl(url) {
      return /\.rss(?:$|[?#])/i.test(String(url || "")) || /\/News\/NewsByCateFeed\//i.test(String(url || ""));
    }

    function safeArticleUrl(item) {
      const url = String(item.canonicalUrl || item.url || item.originalUrl || item.link || "").trim();
      const publicHsxUrl = toPublicHsxUrl(url);
      if (publicHsxUrl) {
        return publicHsxUrl;
      }
      if (isHsxSource(item) && (!url || isFeedUrl(url))) {
        return HSX_PUBLIC_URL;
      }
      return /^https?:\/\//i.test(url) && !isFeedUrl(url) ? url : "";
    }

    function hashText(value) {
      const text = normalizedText(value).replace(/\s+/g, " ").trim();
      let hash = 0;
      for (let index = 0; index < text.length; index += 1) {
        hash = ((hash << 5) - hash + text.charCodeAt(index)) | 0;
      }
      return Math.abs(hash).toString(36);
    }

    }

    function sourceTierFor(item) {
      const source = normalizedText(`${item.source || ""} ${item.sourceName || ""}`);
      if (/\b(hose|hsx|hnx|ssc|vsdc|ubck|so giao dich|cong bo thong tin)\b/.test(source)) return 1;
      if (/\b(vietstock|cafef|stockbiz|vneconomy|ndh|fili)\b/.test(source)) return 2;
      if (/\b(vietnamfinance|bao dau tu|nhịp sống thị trường|nhip song thi truong)\b/.test(source)) return 3;
      return 4;
    }

    function sourceWeightForTier(tier) {
      return {1: 100, 2: 82, 3: 58, 4: 36}[tier] || 30;
    }

    function hasImage(item) {
      return Boolean(item.image || item.thumbnail || item.imageUrl || item.coverUrl);
    }

    function qualityScoreFor(item, duplicatePenalty = 0) {
      const tier = Number(item.sourceTier || sourceTierFor(item));
      const titleLength = String(item.title || "").trim().length;
      const summaryLength = String(item.summary || "").trim().length;
      const ageHours = timestampMs(item.publishedAt || item.createdAt)
        ? Math.max(0, (Date.now() - timestampMs(item.publishedAt || item.createdAt)) / 3600000)
        : 999;
      let score = sourceWeightForTier(tier);
      if (ageHours <= 1) score += 18;
      else if (ageHours <= 6) score += 12;
      else if (ageHours <= 24) score += 7;
      else if (ageHours <= 72) score += 3;
      if (titleLength >= 35) score += 10;
      else if (titleLength < 16) score -= 18;
      if (summaryLength >= 60) score += 10;
      else if (summaryLength > 0) score += 4;
      if (itemTickers(item).length) score += 9;
      if (Array.isArray(item.keywords) && item.keywords.length) score += 5;
      if (hasImage(item)) score += 3;
      if (/quảng cáo|khuyến mãi|giảm giá|mua ngay/i.test(item.title || "")) score -= 16;
      return Math.max(0, Math.min(100, score - duplicatePenalty));
    }

    function normalizeNewsItem(raw) {
      const item = {...raw};
      item.id = String(item.id || item.docId || safeArticleUrl(item) || hashText(`${item.title || ""} ${item.publishedAt || ""}`));
      item.link = safeArticleUrl(item) || item.link || item.originalUrl || item.url || "";
      item.originalUrl = item.originalUrl || item.link || item.url || "";
      item.source = item.source || item.sourceName || "Unknown";
      item.summary = legalSummary(item.summary || item.description || item.contentSnippet || "");
      item.publishedAt = item.publishedAt || item.createdAt || null;
      item.createdAt = item.createdAt || item.publishedAt || null;
      item.titleHash = item.titleHash || hashText(item.title || "");
      item.contentHash = item.contentHash || hashText(`${item.title || ""} ${item.summary || ""}`);
      item.sourceTier = Number(item.sourceTier || sourceTierFor(item));
      item.sourceWeight = Number(item.sourceWeight || sourceWeightForTier(item.sourceTier));
      item.newsQualityScore = Number(item.newsQualityScore || qualityScoreFor(item));
      item.relatedSources = Array.isArray(item.relatedSources) ? item.relatedSources : [];
      return item;
    }

    function duplicateKeysFor(item) {
      return [
        item.id ? `id:${item.id}` : "",
        item.link ? `link:${normalizedText(item.link)}` : "",
        item.originalUrl ? `link:${normalizedText(item.originalUrl)}` : "",
        item.titleHash ? `title:${item.titleHash}` : "",
        item.contentHash ? `content:${item.contentHash}` : "",
      ].filter(Boolean);
    }

    function betterNewsItem(left, right) {
      const leftScore = Number(left.newsQualityScore || qualityScoreFor(left));
      const rightScore = Number(right.newsQualityScore || qualityScoreFor(right));
      if (rightScore !== leftScore) return rightScore > leftScore ? right : left;
      const sourceDiff = Number(right.sourceWeight || 0) - Number(left.sourceWeight || 0);
      if (sourceDiff !== 0) return sourceDiff > 0 ? right : left;
      const lengthDiff = String(right.summary || "").length - String(left.summary || "").length;
      if (lengthDiff !== 0) return lengthDiff > 0 ? right : left;
      if (hasImage(right) !== hasImage(left)) return hasImage(right) ? right : left;
      return timestampMs(right.publishedAt || right.createdAt) > timestampMs(left.publishedAt || left.createdAt) ? right : left;
    }

    function uniq(values) {
      return Array.from(new Set(values.filter(Boolean))).sort((a, b) => a.localeCompare(b));
    }

    function priorityOf(item) {
      return item.priorityLabel || item.riskLevel || "normal";
    }

    function scoreValue(item) {
      const impactScore = Number.isFinite(item.impactScore) ? item.impactScore : Number(item.impactScore || 0);
      const finalScore = Number.isFinite(item.finalScore) ? item.finalScore : Number(item.finalScore || 0);
      return Math.max(impactScore || 0, finalScore || 0);
    }

    function rankScore(item) {
      const impactScore = Number.isFinite(item.impactScore) ? item.impactScore : Number(item.impactScore || 0);
      const analyzerScore = Number.isFinite(item.finalScore) ? item.finalScore : impactScore;
      const publishedAt = toDate(item.publishedAt);
      const ageMinutes = publishedAt ? Math.max(0, (Date.now() - publishedAt.getTime()) / 60000) : Number.POSITIVE_INFINITY;
      let freshnessBoost = 0;

      if (ageMinutes <= 30) freshnessBoost = 24;
      else if (ageMinutes <= 120) freshnessBoost = 18;
      else if (ageMinutes <= 360) freshnessBoost = 12;
      else if (ageMinutes <= 1440) freshnessBoost = 7;
      else if (ageMinutes <= 4320) freshnessBoost = 3;

      return Math.max(impactScore, analyzerScore) + freshnessBoost;
    }

    function itemTime(item) {
      return toDate(item.publishedAt) || toDate(item.createdAt);
    }

    function itemTickers(item) {
      const {ticker} = splitTitleTicker(item);
      const tickers = Array.isArray(item.tickers) ? item.tickers.filter(Boolean) : [];
      const related = Array.isArray(item.relatedStocks) ? item.relatedStocks.filter(Boolean) : [];
      return uniq([ticker, ...tickers, ...related].map((value) => String(value || "").toUpperCase()));
    }

    function scoreClass(score) {
      if (score >= 70) return "hot";
      if (score >= 45) return "watch";
      return "neutral";
    }

    function relativeTime(value) {
      const date = toDate(value);
      if (!date) return "";
      const diffMinutes = Math.max(0, Math.floor((Date.now() - date.getTime()) / 60000));
      if (diffMinutes < 1) return "vừa xong";
      if (diffMinutes < 60) return `${diffMinutes} phút trước`;
      const diffHours = Math.floor(diffMinutes / 60);
      if (diffHours < 24) return `${diffHours} giờ trước`;
      return date.toLocaleString("vi-VN", {
        hour: "2-digit",
        minute: "2-digit",
        day: "2-digit",
        month: "2-digit",
      });
    }

    function shortSource(value) {
      return String(value || "Unknown")
        .replace(/^HOSE\s*-\s*/i, "HOSE")
        .replace(/^HNX\s*-\s*/i, "HNX")
        .replace(/^VnEconomy\s*-\s*/i, "VnEconomy");
    }

    function splitTitleTicker(item) {
      const rawTitle = String(item.title || "Không có tiêu đề").trim();
      const prefixMatch = rawTitle.match(/^\s*([A-Z0-9]{2,10})\s*[:：-]\s*(.+)$/);
      const tickers = Array.isArray(item.tickers) ? item.tickers.filter(Boolean) : [];
      return {
        ticker: prefixMatch?.[1] || tickers[0] || "",
        title: prefixMatch?.[2] || rawTitle,
      };
    }

    function normalizedText(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/đ/g, "d")
        .replace(/Đ/g, "D")
        .toLowerCase();
    }

    function itemText(item) {
      return normalizedText(`${item.title || ""} ${item.summary || ""} ${item.source || ""} ${(item.keywords || []).join(" ")} ${(item.sectors || []).join(" ")}`);
    }

    function firstMatchingRule(text, rules) {
      const match = rules.find(([, words]) => words.some((word) => text.includes(normalizedText(word))));
      return match ? match[0] : null;
    }

    function deriveSector(item) {
      if (item.sector && SECTOR_LABELS[item.sector]) return item.sector;
      const text = itemText(item);
      const sectors = Array.isArray(item.sectors) ? item.sectors : [];
      const fromAnalyzer = sectors.find((sector) => SECTOR_LABELS[sector]);
      if (fromAnalyzer) return fromAnalyzer;
      if ((item.group || "").toLowerCase() === "international") return "international";
      return firstMatchingRule(text, SECTOR_RULES) || "macro";
    }

    function deriveSentiment(item) {
      if (["positive", "negative", "neutral"].includes(item.sentiment)) return item.sentiment;
      const raw = String(item.marketSentiment || item.sentiment || "").toLowerCase();
      const text = itemText(item);
      if (/positive|bullish|risk_on/.test(raw) || text.includes("tich cuc") || text.includes("tang manh") || text.includes("vuot ke hoach") || text.includes("lai lon")) return "positive";
      if (/negative|bearish|risk_off|panic/.test(raw) || text.includes("tieu cuc") || text.includes("giam manh") || text.includes("rui ro") || text.includes("dinh chi") || text.includes("thua lo")) return "negative";
      return "neutral";
    }

    function deriveImpactLevel(item) {
      if (["hot", "watch", "normal", "noise"].includes(item.impactLevel)) return item.impactLevel;
      const score = Number.isFinite(item.impactScore) ? item.impactScore : Number(item.finalScore || 0);
      if (item.priorityLabel === "hot" || item.signalStrength === "strong" || score >= 70) return "hot";
      if (item.priorityLabel === "watch" || item.priorityLabel === "important" || item.brokerDecision === "watchlist_candidate" || score >= 45) return "watch";
      return "normal";
    }

    function deriveEventType(item) {
      if (item.eventType) return item.eventType;
      const text = itemText(item);
      if (text.includes("chot quyen") || text.includes("dkcc") || text.includes("ngay dang ky cuoi cung")) return "ex_right";
      if (text.includes("co tuc") || text.includes("tra co") || text.includes("tam ung")) return "dividend";
      if (text.includes("bo nhiem") || text.includes("mien nhiem") || text.includes("chu tich") || text.includes("tong giam doc") || text.includes("chinh sach")) return "leadership_policy";
      if (text.includes("chinh phu") || text.includes("thu tuong") || text.includes("quoc hoi") || text.includes("bo tai chinh")) return "government";
      if (text.includes("ty gia") || text.includes("lai suat") || text.includes("fed") || text.includes("nhnn")) return "fx_interest_rate";
      if (text.includes("xuat khau") || text.includes("don hang") || text.includes("thi truong my") || text.includes("eu")) return "export";
      return null;
    }

    function getIntelFields(item) {
      return {
        categoryGroup: deriveSector(item),
        sector: deriveSector(item),
        sentiment: deriveSentiment(item),
        impactLevel: deriveImpactLevel(item),
        eventType: deriveEventType(item),
      };
    }

    function tabKeywordMatch(item, words = []) {
      if (!words.length) return false;
      const text = itemText(item);
      return words.some((word) => text.includes(normalizedText(word)));
    }

    function tabMatchesItem(item, activeTab) {
      const fields = getIntelFields(item);
      const score = Number.isFinite(item.impactScore) ? item.impactScore : Number(item.finalScore || 0);
      const eventType = fields.eventType || null;
      const marketScope = item.marketScope || null;

      if (!activeTab || activeTab.type === "all") return true;
      if (activeTab.type === "impact" && activeTab.value === "hot") return fields.impactLevel === "hot" || score >= 70;
      if (activeTab.type === "impact" && activeTab.value === "watch") return fields.impactLevel === "watch";
      if (activeTab.type === "sentiment") return fields.sentiment === activeTab.value;
      if (activeTab.type === "event") return fields.eventType === activeTab.value;
      if (activeTab.type === "eventSet") {
        return (activeTab.values || []).includes(eventType) || tabKeywordMatch(item, activeTab.words);
      }
      if (activeTab.type === "sector") return fields.sector === activeTab.value;
      if (activeTab.type === "keyword") return tabKeywordMatch(item, activeTab.words);
      if (activeTab.type === "sectorEvent") {
        return fields.sector === activeTab.sector || (activeTab.values || []).includes(eventType);
      }
      if (activeTab.type === "scopeEvent") {
        return marketScope === activeTab.scope || (activeTab.values || []).includes(eventType);
      }
      return true;
    }

    function tabMatches(item) {
      return tabMatchesItem(item, INTEL_TABS.find((tab) => tab.id === state.view));
    }

    function groupKey(item) {
      if (item.clusterId) return item.clusterId;
      const {ticker, title} = splitTitleTicker(item);
      const compactTitle = normalizedText(title)
        .replace(/\b(cbtt|thong bao|bao cao|nghi quyet|quyet dinh)\b/g, "")
        .replace(/[^a-z0-9]+/g, " ")
        .trim()
        .slice(0, 72);
      return `${ticker || "NO_TICKER"}|${compactTitle}`;
    }

    function tickerWeight(item) {
      const tickers = Array.isArray(item.tickers) ? item.tickers : [];
      const major = new Set(["VCB", "BID", "CTG", "MBB", "TCB", "HPG", "FPT", "VIC", "VHM", "VNM", "GAS", "SSI", "VND"]);
      return tickers.reduce((sum, ticker) => sum + (major.has(String(ticker).toUpperCase()) ? 8 : 3), 0);
    }

    function groupRank(group) {
      const item = group.primary;
      const duplicateBoost = Math.min(18, ((group.duplicateCount || group.items.length) - 1) * 6);
      return rankScore(item) + duplicateBoost + tickerWeight(item);
    }

    function groupItems(items) {
      const map = new Map();
      items.forEach((item) => {
        const key = groupKey(item);
        const entry = map.get(key) || {key, items: [], sources: new Set(), urls: new Map()};
        entry.items.push(item);
        entry.sources.add(item.source || "Unknown");
        if (Array.isArray(item.sources)) item.sources.forEach((source) => entry.sources.add(source || "Unknown"));
        const url = safeArticleUrl(item);
        if (url) entry.urls.set(url, item.source || url);
        if (Array.isArray(item.sourceUrls)) item.sourceUrls.forEach((sourceUrl, index) => {
          if (sourceUrl) entry.urls.set(sourceUrl, Array.isArray(item.sources) ? (item.sources[index] || sourceUrl) : sourceUrl);
        });
        map.set(key, entry);
      });

      return Array.from(map.values()).map((group) => {
        group.items.sort(compareItems);
        group.primary = group.items[0];
        group.duplicateCount = Math.max(group.items.length, Number(group.primary.duplicateCount || 1));
        group.rank = groupRank(group);
        return group;
      }).sort((left, right) => {
        const itemDiff = compareItems(left.primary, right.primary);
        if (itemDiff !== 0) return itemDiff;
        return right.rank - left.rank;
      });
    }

    function itemMatchesNonTabFilters(item) {
      const sectors = Array.isArray(item.sectors) ? item.sectors : [];
      const priority = priorityOf(item);
      const source = item.source || "Unknown";

      if (!state.showNoise && state.summaryFilter !== "hidden" && isNoiseItem(item)) return false;
      if (state.sourceScope === "trusted" && Number(item.sourceTier || sourceTierFor(item)) > 2) return false;
      if (state.priority !== "all" && state.priority !== "risk" && priority !== state.priority) return false;
      if (state.priority === "risk" && !isRiskItem(item)) return false;
      if (state.newsType !== "all" && (item.newsType || "normal") !== state.newsType) return false;
      if (state.sector !== "all" && !sectors.includes(state.sector)) return false;
      if (state.marketSentiment !== "all" && (item.marketSentiment || "neutral") !== state.marketSentiment) return false;
      if (state.impactHorizon !== "all" && (item.impactHorizon || "unknown") !== state.impactHorizon) return false;
      if (state.signalStrength !== "all" && (item.signalStrength || "weak") !== state.signalStrength) return false;
      if (state.brokerDecision !== "all" && (item.brokerDecision || "check_later") !== state.brokerDecision) return false;
      if (state.source !== "all" && source !== state.source) return false;
      if (!itemMatchesTicker(item, state.ticker)) return false;
      if (!itemMatchesLetter(item)) return false;
      if (!itemMatchesSummaryFilter(item)) return false;
      return true;
    }

    function tabCountClass(count) {
      if (count >= 10) return "high";
      if (count >= 4) return "medium";
      return "low";
    }

    function getTabCounts() {
      const baseItems = state.items.filter(itemMatchesNonTabFilters);
      const counts = new Map();
      INTEL_TABS.forEach((tab) => {
        counts.set(tab.id, baseItems.filter((item) => tabMatchesItem(item, tab)).length);
      });
      return counts;
    }

    function renderTabs() {
      tabsEl.classList.toggle("is-collapsed", !state.tabsExpanded);
      const counts = getTabCounts();
      const groups = state.tabsExpanded ? INTEL_TAB_GROUPS : INTEL_TAB_GROUPS.filter((group) => group.primary);
      tabsEl.innerHTML = groups.map((group) => `
        <div class="intel-tab-group ${group.primary ? "" : "is-secondary"}">
          <div class="intel-tab-heading">${escapeHtml(group.label)}</div>
          ${group.tabs.map((tab) => {
            const count = counts.get(tab.id) || 0;
            const countBadge = count > 0
              ? `<span class="chip-count ${tabCountClass(count)}">${escapeHtml(count)}</span>`
              : "";
            return `
              <button class="intel-tab ${tab.id === state.view ? "active" : ""}" data-view="${escapeHtml(tab.id)}" title="${escapeHtml(tab.label)}">
                <span>${escapeHtml(tab.label)}</span>${countBadge}
              </button>
            `;
          }).join("")}
        </div>
      `).join("");
      tabsToggleEl.textContent = state.tabsExpanded ? "Thu gọn" : "Mở rộng";
    }

    function renderLetterFilter() {
      letterFilterEl.innerHTML = LETTER_FILTERS.map((letter) => `
        <button class="${letter === state.tickerLetter ? "active" : ""}" data-letter="${escapeHtml(letter)}">
          ${escapeHtml(letter === "all" ? "Tất cả" : letter)}
        </button>
      `).join("");
    }

    function isRiskItem(item) {
      return item.newsType === "risk_event" || item.riskLevel === "high" || item.advisoryAction === "risk_warning" || item.advisoryAction === "alert_client";
    }

    function itemMatchesTicker(item, query) {
      if (!query) return true;
      const target = normalizedText(query);
      return normalizedText(`${itemTickers(item).join(" ")} ${item.title || ""} ${item.summary || ""} ${item.source || ""}`).includes(target);
    }

    function isNoiseItem(item) {
      return item.isNoise === true || item.status === "hidden" || item.status === "archived";
    }

    function hasTickerSignal(item) {
      return itemTickers(item).length > 0
        || (Array.isArray(item.relatedStocks) && item.relatedStocks.length > 0);
    }

    function itemMatchesSummaryFilter(item) {
      return itemMatchesSummaryFilterWithId(item, state.summaryFilter);
    }

    function itemMatchesSummaryFilterWithId(item, filterId) {
      const fields = getIntelFields(item);
      const score = scoreValue(item);
      if (filterId === "all" || filterId === "visible") return true;
      if (filterId === "hot") return fields.impactLevel === "hot" || score >= 70 || priorityOf(item) === "hot";
      if (filterId === "urgent") return item.brokerDecision === "urgent_alert" || isRiskItem(item) || item.riskLevel === "high";
      if (filterId === "market") return item.newsType === "market_movement";
      if (filterId === "macro") return item.newsType === "macro" || fields.sector === "macro";
      if (filterId === "strong") return item.signalStrength === "strong" || item.newsType === "strong_signal";
      if (filterId === "hidden") return isNoiseItem(item);
      if (filterId === "ticker") return hasTickerSignal(item);
      return true;
    }

    function itemMatchesLetter(item) {
      if (state.tickerLetter === "all") return true;
      return itemTickers(item).some((ticker) => ticker.startsWith(state.tickerLetter));
    }

    function renderOptions(selectEl, values, allLabel, selected) {
      const current = selected || "all";
      const optionValues = current !== "all" && !values.includes(current)
        ? [current, ...values]
        : values;
      selectEl.innerHTML = `<option value="all">${escapeHtml(allLabel)}</option>` +
        optionValues.map((value) => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`).join("");
      selectEl.value = current;
    }

    function refreshFilterOptions() {
      if (!["default", "newest", "oldest"].includes(timeFilterEl.value)) {
        timeFilterEl.value = state.timeSort;
      }
      state.timeSort = ["newest", "oldest"].includes(timeFilterEl.value) ? timeFilterEl.value : "default";
      if (!["default", "score_desc", "score_asc"].includes(scoreFilterEl.value)) {
        scoreFilterEl.value = state.scoreSort;
      }
      state.scoreSort = ["score_desc", "score_asc"].includes(scoreFilterEl.value) ? scoreFilterEl.value : "default";

      renderOptions(newsTypeFilterEl, uniq(state.items.map((item) => item.newsType || "normal")), "Tất cả loại tin", state.newsType);
      renderOptions(sectorFilterEl, uniq(state.items.flatMap((item) => Array.isArray(item.sectors) ? item.sectors : [])), "Tất cả ngành", state.sector);
      renderOptions(marketSentimentFilterEl, uniq(state.items.map((item) => item.marketSentiment || "neutral")), "Tất cả trạng thái", state.marketSentiment);
      renderOptions(impactHorizonFilterEl, uniq(state.items.map((item) => item.impactHorizon || "unknown")), "Tất cả thời hạn", state.impactHorizon);
      renderOptions(signalStrengthFilterEl, uniq(state.items.map((item) => item.signalStrength || "weak")), "Tất cả tín hiệu", state.signalStrength);
      renderOptions(brokerDecisionFilterEl, uniq(state.items.map((item) => item.brokerDecision || "check_later")), "Tất cả quyết định", state.brokerDecision);
      renderOptions(sourceFilterEl, uniq(state.items.map((item) => item.source || "Unknown")), "Tất cả nguồn", state.source);

      state.newsType = newsTypeFilterEl.value;
      state.sector = sectorFilterEl.value;
      state.marketSentiment = marketSentimentFilterEl.value;
      state.impactHorizon = impactHorizonFilterEl.value;
      state.signalStrength = signalStrengthFilterEl.value;
      state.brokerDecision = brokerDecisionFilterEl.value;
      state.source = sourceFilterEl.value;
    }

    function getFilteredItems() {
      return state.items.filter((item) => {
        if (!itemMatchesNonTabFilters(item)) return false;
        if (!tabMatches(item)) return false;
        return true;
      }).sort((left, right) => {
        return compareItems(left, right);
      });
    }

    function itemTimeMs(item) {
      return itemTime(item)?.getTime() || 0;
    }

    function compareByTime(left, right) {
      const leftTime = itemTimeMs(left);
      const rightTime = itemTimeMs(right);
      const timeDiff = state.timeSort === "oldest"
        ? leftTime - rightTime
        : rightTime - leftTime;
      return timeDiff;
    }

    function compareByScore(left, right) {
      if (state.scoreSort === "score_asc") return scoreValue(left) - scoreValue(right);
      if (state.scoreSort === "score_desc") return scoreValue(right) - scoreValue(left);
      return 0;
    }

    function compareItems(left, right) {
      const scoreDiff = compareByScore(left, right);
      if (scoreDiff !== 0) return scoreDiff;
      if (state.timeSort !== "default") {
        const timeDiff = compareByTime(left, right);
        if (timeDiff !== 0) return timeDiff;
      }
      const defaultScoreDiff = scoreValue(right) - scoreValue(left);
      if (defaultScoreDiff !== 0) return defaultScoreDiff;
      const rankDiff = rankScore(right) - rankScore(left);
      if (rankDiff !== 0) return rankDiff;
      return itemTimeMs(right) - itemTimeMs(left);
    }

    function renderSummary() {
      const noiseHidden = state.items.filter((item) => isNoiseItem(item)).length;
      const tickers = uniq(state.items.flatMap((item) => itemTickers(item)));
      const cards = [
        ["all", "📦", "Tổng tải", state.items.length, "info"],
        ["visible", "👁", "Hiển thị", state.filtered.length, "info"],
        ["hot", "🔥", "Tin nóng", state.items.filter((item) => itemMatchesSummaryFilterWithId(item, "hot")).length, "hot"],
        ["urgent", "🚨", "Cảnh báo khẩn", state.items.filter((item) => itemMatchesSummaryFilterWithId(item, "urgent")).length, "risk"],
        ["market", "📈", "Vận động thị trường", state.items.filter((item) => item.newsType === "market_movement").length, "good"],
        ["macro", "🌍", "Vĩ mô", state.items.filter((item) => itemMatchesSummaryFilterWithId(item, "macro")).length, "info"],
        ["strong", "⚡", "Tín hiệu mạnh", state.items.filter((item) => itemMatchesSummaryFilterWithId(item, "strong")).length, "hot"],
        ["hidden", "🗂", "Đã ẩn", noiseHidden, "info"],
        ["ticker", "🏷", "Mã liên quan", tickers.length, "good"],
      ];

      summaryEl.innerHTML = cards.map(([id, icon, label, value, type]) => `
        <button class="summary-pill ${escapeHtml(type)} ${id === state.summaryFilter ? "active" : ""}" type="button" data-summary-filter="${escapeHtml(id)}">
          <span>${escapeHtml(icon)}</span>
          <span>${escapeHtml(label)}:</span>
          <strong>${escapeHtml(value)}</strong>
        </button>
      `).join("");
    }

    function tabLabel(id) {
      return INTEL_TABS.find((tab) => tab.id === id)?.label || id;
    }

    function summaryFilterLabel(id) {
      const labels = {
        hot: "Tin nóng",
        urgent: "Cảnh báo khẩn",
        market: "Vận động thị trường",
        macro: "Vĩ mô",
        strong: "Tín hiệu mạnh",
        hidden: "Đã ẩn",
        ticker: "Mã liên quan",
      };
      return labels[id] || id;
    }

    function timeSortLabel(value) {
      if (value === "newest") return "Mới nhất";
      if (value === "oldest") return "Cũ nhất";
      return "";
    }

    function scoreSortLabel(value) {
      if (value === "score_desc") return "Điểm cao → thấp";
      if (value === "score_asc") return "Điểm thấp → cao";
      return "";
    }

    function activeFilters() {
      const filters = [];
      if (state.ticker) filters.push({key: "search", label: `Tìm: ${state.ticker}`});
      if (state.tickerLetter !== "all") filters.push({key: "letter", label: `Mã ${state.tickerLetter}`});
      if (state.view !== "all") filters.push({key: "view", label: tabLabel(state.view)});
      if (state.summaryFilter !== "all") filters.push({key: "summary", label: summaryFilterLabel(state.summaryFilter)});
      if (state.timeSort !== "default") filters.push({key: "timeSort", label: timeSortLabel(state.timeSort)});
      if (state.scoreSort !== "default") filters.push({key: "scoreSort", label: scoreSortLabel(state.scoreSort)});
      if (state.sourceScope === "trusted") filters.push({key: "sourceScope", label: "Chỉ nguồn uy tín"});
      if (state.showNoise) filters.push({key: "showNoise", label: "Hiện tin nhiễu"});
      [
        ["newsType", "Loại"],
        ["sector", "Ngành"],
        ["marketSentiment", "Trạng thái"],
        ["impactHorizon", "Thời hạn"],
        ["signalStrength", "Tín hiệu"],
        ["brokerDecision", "Quyết định"],
        ["source", "Nguồn"],
      ].forEach(([key, label]) => {
        if (state[key] !== "all") filters.push({key, label: `${label}: ${state[key]}`});

    function freshnessWeight(item) {
      const date = itemTime(item);
      if (!date) return 0.4;
      const ageMinutes = Math.max(0, (Date.now() - date.getTime()) / 60000);
      if (ageMinutes <= 15) return 1.5;
      if (ageMinutes <= 60) return 1.25;
      if (ageMinutes <= 180) return 1;
      if (ageMinutes <= 360) return 0.75;
      if (ageMinutes <= 1440) return 0.5;
      return 0.25;
    }

    function badge(value, extraClass = "") {
      if (!value) return "";
      return `<span class="badge ${escapeHtml(extraClass)}">${escapeHtml(value)}</span>`;
    }

    function renderDashboard(groups) {
      if (state.view !== "all") {
        dashboardEl.innerHTML = "";
        return;
      }

      const now = new Date();
      const isToday = (value) => {
        const date = toDate(value);
        return date
          && date.getFullYear() === now.getFullYear()
          && date.getMonth() === now.getMonth()
          && date.getDate() === now.getDate();
      };

      const todayGroups = groups.filter((group) => isToday(group.primary.publishedAt));
      const sectorMap = new Map();
      todayGroups.forEach((group) => {
        const fields = getIntelFields(group.primary);
        const current = sectorMap.get(fields.sector) || {sector: fields.sector, count: 0, hot: 0, watch: 0, score: 0};
        current.count += group.items.length;
        current.hot += fields.impactLevel === "hot" ? 1 : 0;
        current.watch += fields.impactLevel === "watch" ? 1 : 0;
        current.score += scoreValue(group.primary) * freshnessWeight(group.primary);
        sectorMap.set(fields.sector, current);
      });

      const heatCells = Array.from(sectorMap.values())
        .sort((a, b) => b.score - a.score)
        .slice(0, 5)
        .map((item, index) => {
        const heatClass = item.hot ? "hot" : item.watch ? "watch" : "good";
        return `
          <div class="heat-cell ${heatClass}">
            <div class="heat-label">${escapeHtml(index + 1)}. ${escapeHtml(SECTOR_LABELS[item.sector] || item.sector)}</div>
            <div class="heat-meta">${escapeHtml(item.count)} tin · heat ${escapeHtml(Math.round(item.score))} · hot ${escapeHtml(item.hot)}</div>
          </div>
        `;
      }).join("") || `<div class="empty">Chưa có ngành nóng trong ngày.</div>`;

      const tickerMap = new Map();
      todayGroups.forEach((group) => {
        const tickers = Array.isArray(group.primary.tickers) ? group.primary.tickers : [];
        tickers.forEach((ticker) => {
          const key = String(ticker).toUpperCase();
          const current = tickerMap.get(key) || {ticker: key, count: 0, score: 0, title: ""};
          current.count += group.items.length;
          current.score += group.rank;
          current.title ||= splitTitleTicker(group.primary).title;
          tickerMap.set(key, current);
        });
      });

      const tickerCells = Array.from(tickerMap.values())
        .sort((a, b) => b.count - a.count || b.score - a.score)
        .slice(0, 10)
        .map((item) => `
          <div class="ticker-cell">
            <strong>${escapeHtml(item.ticker)}</strong><span>${escapeHtml(item.count)} tin</span>
            <div>${escapeHtml(item.title)}</div>
          </div>
        `).join("") || `<div class="empty">Chưa có ticker nổi bật.</div>`;

      const liveRows = groups.slice(0, 12).map((group) => {
        const {ticker, title} = splitTitleTicker(group.primary);
        const sourceUrl = safeArticleUrl(group.primary);
        return `
          <div class="live-row" ${sourceUrl ? `data-source-url="${escapeHtml(sourceUrl)}"` : ""}>
            <strong>${escapeHtml(ticker || "NEWS")}</strong>
            <span>${escapeHtml(title)}</span>
            <em>${escapeHtml(relativeTime(group.primary.publishedAt))}</em>
          </div>
        `;
      }).join("");

      dashboardEl.innerHTML = `
        <section class="intel-panel">
          <h2>🔥 Ngành nóng hôm nay</h2>
          <div class="heatmap-grid">${heatCells}</div>
        </section>
        <section class="intel-panel">
          <h2>Mã được nhắc nhiều</h2>
          <div class="ticker-grid">${tickerCells}</div>
        </section>
        <section class="intel-panel">
          <h2>Live ticker realtime</h2>
          <div class="live-ticker">${liveRows}</div>
        </section>
      `;
    }

      const displayTitle = item.clusterTitle && group.items.length > 1 ? item.clusterTitle : title;

    function sortMasterNews() {
      state.masterNewsStore.sort((left, right) => timestampMs(right.publishedAt || right.createdAt) - timestampMs(left.publishedAt || left.createdAt));
      if (state.masterNewsStore.length > MAX_MASTER_NEWS) {
        state.masterNewsStore = state.masterNewsStore.slice(0, MAX_MASTER_NEWS);
      }
      state.items = state.masterNewsStore;
    }

    function mergeIntoMasterStore(rawItems, {deferRender = false} = {}) {
      const normalizedItems = rawItems.map(normalizeNewsItem).filter((item) => item.title);
      const index = new Map();
      state.masterNewsStore.forEach((item, itemIndex) => {
        duplicateKeysFor(item).forEach((key) => index.set(key, itemIndex));
      });

      let added = 0;
      normalizedItems.forEach((incoming) => {
        const duplicateIndex = duplicateKeysFor(incoming)
          .map((key) => index.get(key))
          .find((value) => Number.isInteger(value));
        if (Number.isInteger(duplicateIndex)) {
          const existing = state.masterNewsStore[duplicateIndex];
          const best = betterNewsItem(existing, incoming);
          const other = best === existing ? incoming : existing;
          const relatedSources = new Set([
            ...(existing.relatedSources || []),
            ...(incoming.relatedSources || []),
            existing.source,
            incoming.source,
          ].filter(Boolean));
          state.masterNewsStore[duplicateIndex] = {
            ...existing,
            ...best,
            relatedSources: Array.from(relatedSources).filter((source) => source !== best.source),
            duplicateCount: Math.max(Number(existing.duplicateCount || 1), Number(incoming.duplicateCount || 1), relatedSources.size),
            newsQualityScore: qualityScoreFor(best, best === incoming ? 0 : 3),
          };
        } else {
          state.masterNewsStore.push(incoming);
          duplicateKeysFor(incoming).forEach((key) => index.set(key, state.masterNewsStore.length - 1));
          added += 1;
        }
      });

      sortMasterNews();
      saveNewsCache();
      if (added && deferRender) {
        state.pendingNewItems = normalizedItems.slice(0, added);
        showNewNewsNotice(added);
      }
      return added;
    }

    function applyFilterChange() {
      state.renderLimit = RENDER_STEP;
      refreshFilterOptions();
      renderItems();
    }

    function latestMasterDate() {
      return state.masterNewsStore.reduce((latest, item) => Math.max(latest, timestampMs(item.publishedAt || item.createdAt)), 0);
    }

    function isNearTop() {
      return window.scrollY < 180;
    }

    function formatCacheTime(value) {
      const date = value ? new Date(value) : null;
      if (!date || Number.isNaN(date.getTime())) return "--:--";
      return date.toLocaleTimeString("vi-VN", {hour: "2-digit", minute: "2-digit"});
    }

    function loadNewsCache() {
      try {
        const raw = localStorage.getItem(NEWS_CACHE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        const items = Array.isArray(parsed.items) ? parsed.items : [];
        state.cacheUpdatedAt = parsed.updatedAt || null;
        state.masterNewsStore = items.map(normalizeNewsItem);
        sortMasterNews();
      } catch (error) {
        console.warn("Cannot load news cache", error);
      }
    }

    function saveNewsCache() {
      try {
        state.cacheUpdatedAt = Date.now();
        const publicItems = state.masterNewsStore.slice(0, MAX_MASTER_NEWS).map((item) => ({
          id: item.id,
          title: item.title || "",
          link: item.link || "",
          originalUrl: item.originalUrl || "",
          source: item.source || "Unknown",
          sourceTier: item.sourceTier || sourceTierFor(item),
          sourceWeight: item.sourceWeight || sourceWeightForTier(item.sourceTier),
          category: item.category || item.group || "",
          publishedAt: toCacheDate(item.publishedAt),
          createdAt: toCacheDate(item.createdAt),
          summary: item.summary || "",
          image: item.image || "",
          tickers: Array.isArray(item.tickers) ? item.tickers : [],
          relatedStocks: Array.isArray(item.relatedStocks) ? item.relatedStocks : [],
          keywords: Array.isArray(item.keywords) ? item.keywords : [],
          titleHash: item.titleHash || hashText(item.title || ""),
          contentHash: item.contentHash || hashText(`${item.title || ""} ${item.summary || ""}`),
          newsQualityScore: item.newsQualityScore || qualityScoreFor(item),
          relatedSources: Array.isArray(item.relatedSources) ? item.relatedSources : [],
          newsType: item.newsType || "",
          priorityLabel: item.priorityLabel || "",
          finalScore: item.finalScore || 0,
          impactScore: item.impactScore || 0,
          confidenceScore: item.confidenceScore || 0,
          marketSentiment: item.marketSentiment || "",
          impactHorizon: item.impactHorizon || "",
          signalStrength: item.signalStrength || "",
          brokerDecision: item.brokerDecision || "",
          sectors: Array.isArray(item.sectors) ? item.sectors : [],
          eventType: item.eventType || "",
          uiBadge: item.uiBadge || "",
        }));
        localStorage.setItem(NEWS_CACHE_KEY, JSON.stringify({updatedAt: state.cacheUpdatedAt, items: publicItems}));
      } catch (error) {
        console.warn("Cannot save news cache", error);
      }
    }

    function showNewNewsNotice(count) {
      if (!newNewsNoticeEl || !newNewsButtonEl) return;
      state.pendingNewItems = state.pendingNewItems.slice(0, count);
      newNewsButtonEl.textContent = `Có ${count} tin mới - bấm để cập nhật`;
      newNewsNoticeEl.hidden = false;
    }

    function hideNewNewsNotice() {
      if (!newNewsNoticeEl) return;
      state.pendingNewItems = [];
      newNewsNoticeEl.hidden = true;
    }

    function updateLoadMoreState() {
      if (!loadMoreRowEl || !loadMoreButtonEl || !loadMoreStatusEl) return;
      if (!state.firstPageReady) {
        loadMoreRowEl.hidden = false;
        loadMoreButtonEl.disabled = true;
        loadMoreStatusEl.textContent = "Đang tải...";
        return;
      }

      loadMoreRowEl.hidden = false;
      const canRenderMore = state.filtered.length > state.renderLimit;
      state.hasMore = canRenderMore;
      loadMoreButtonEl.disabled = state.isLoadingMore || !canRenderMore;
      loadMoreButtonEl.textContent = state.isLoadingMore ? "Đang tải..." : "Tải thêm";
      loadMoreStatusEl.textContent = state.isLoadingMore
        ? "Đang mở rộng"
        : canRenderMore
          ? ""
          : "Đã hết tin";
    }

    function loadMoreItems() {
      if (state.isLoadingMore || !state.firstPageReady) return;
      if (state.filtered.length <= state.renderLimit) return;
      state.isLoadingMore = true;
      updateLoadMoreState();
      window.setTimeout(() => {
        state.renderLimit += RENDER_STEP;
        renderItems();
        state.isLoadingMore = false;
        updateLoadMoreState();
      }, 80);
    }

    function maybeLoadMoreOnScroll() {
      if (state.isLoadingMore || !state.firstPageReady || state.filtered.length <= state.renderLimit) return;
      const distanceToBottom = document.documentElement.scrollHeight - window.innerHeight - window.scrollY;
      if (distanceToBottom < 520) loadMoreItems();
    }

    async function syncNewerItems({silent = false} = {}) {
      if (!db || state.isSyncing) return;
      const latest = latestMasterDate();
      state.isSyncing = true;
      try {
        let query = db.collection("news").orderBy("publishedAt", "desc").limit(PAGE_SIZE);
        if (latest) query = db.collection("news")
          .where("publishedAt", ">", new Date(latest))
          .orderBy("publishedAt", "desc")
          .limit(PAGE_SIZE);
        const snapshot = await query.get();
        const items = snapshot.docs.map((doc) => ({id: doc.id, ...doc.data()}));
        const shouldRender = isNearTop() || !state.firstPageReady;
        const added = mergeIntoMasterStore(items, {deferRender: !shouldRender && !silent});
        state.lastAutoSyncAt = Date.now();
        state.firstPageReady = true;
        refreshFilterOptions();
        if (shouldRender || !added || silent) {
          if (shouldRender) hideNewNewsNotice();
          renderItems();
        }
      } catch (error) {
        statusEl.textContent = `Lỗi đồng bộ tin mới: ${error.message}`;
      } finally {
        state.isSyncing = false;
      }
    }

    function renderItems() {
      state.items = state.masterNewsStore;
      state.filtered = getFilteredItems();
      state.groups = groupItems(state.filtered);
      const visibleCount = Math.min(state.renderLimit, state.filtered.length);
      statusEl.textContent = `Tổng nguyên liệu đã tải: ${state.items.length} tin. Đang lọc: ${state.filtered.length} tin. Đang hiển thị: ${visibleCount}/${state.filtered.length} tin. Cache cập nhật lúc: ${formatCacheTime(state.cacheUpdatedAt)}.`;
      renderTabs();
      renderSummary();
      renderActiveFilters();
      renderDashboard(state.groups);
      updateLoadMoreState();

      timelineToggleButtonEl.classList.toggle("active", state.timelineMode);
      if (state.timelineMode) {
        renderTimeline();
        return;
      }

      if (!state.groups.length) {
        listEl.innerHTML = `
          <div class="empty">
            Không có tin phù hợp bộ lọc hiện tại.
            ${activeFilters().length ? `<button class="active-filter-reset" type="button" data-reset-filters>Xóa bộ lọc</button>` : ""}
          </div>
        `;
        return;
      }

      const heading = state.view === "all" ? `<div class="subtext">Hot news stream</div>` : "";
      listEl.innerHTML = heading + state.groups.slice(0, state.renderLimit).map(renderGroupCard).join("");
    }

    function summarizeDetailedHtml(items, limit) {
      if (!items.length) return "<p>- Chưa có tin nổi bật trong nhóm này.</p>";
      const rows = items.slice(0, limit).map((item) => {
        const tickers = Array.isArray(item.tickers) && item.tickers.length
          ? item.tickers.join(", ")
          : "Không xác định";
        const url = safeArticleUrl(item);
        const link = url
          ? ` | <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">Mở bài gốc</a>`
          : "";

        return [
          "<li>",
          `<strong>${escapeHtml(item.title || "Không có tiêu đề")}</strong><br>`,
          `Mã: ${escapeHtml(tickers)} | Nguồn: ${escapeHtml(item.source || "Unknown")} | Thời gian: ${escapeHtml(formatTime(item.publishedAt))}${link}`,
          "</li>",
        ].join("");
      }).join("");
      return `<ul>${rows}</ul>`;
    }

    function dominantMarketSentiment(items) {
      const counts = items.reduce((acc, item) => {
        const key = item.marketSentiment || "neutral";
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
      return Object.entries(counts).sort((a, b) => b[1] - a[1])[0]?.[0] || "neutral";
    }

    function createBrokerBulletin() {
      const visibleItems = state.filtered;
      const usefulItems = visibleItems.filter((item) => item.isNoise !== true);
      const noiseHidden = state.items.filter((item) => item.isNoise === true).length;
      const sentiment = dominantMarketSentiment(usefulItems);
      const marketItems = usefulItems.filter((item) => item.newsType === "market_movement");
      const macroItems = usefulItems.filter((item) => item.newsType === "macro");
      const riskItems = usefulItems
        .filter((item) => item.brokerDecision === "urgent_alert" || item.newsType === "risk_event")
        .sort((a, b) => (b.finalScore || 0) - (a.finalScore || 0))
        .slice(0, 5);
      const tickerSectorItems = usefulItems
        .filter((item) => (
          (Array.isArray(item.tickers) && item.tickers.length) ||
          (Array.isArray(item.sectors) && item.sectors.length)
        ))
        .filter((item) => ["hot", "important", "watch"].includes(priorityOf(item)))
        .sort((a, b) => (b.confidenceScore || 0) - (a.confidenceScore || 0))
        .slice(0, 7);
      const macroSectorItems = usefulItems
        .filter((item) => item.newsType === "macro" || (Array.isArray(item.sectors) && item.sectors.length))
        .sort((a, b) => (b.finalScore || 0) - (a.finalScore || 0))
        .slice(0, 5);

      const contextLine = marketItems.length || macroItems.length
        ? `Thị trường đang có ${marketItems.length} tin vận động thị trường và ${macroItems.length} tin vĩ mô đáng theo dõi. Market sentiment nổi bật là ${sentiment}; nên đọc cùng phản ứng VN-Index, thanh khoản và hành vi khối ngoại.`
        : `Chưa có nhiều tín hiệu thị trường chung trong bộ lọc hiện tại. Market sentiment tạm thời là ${sentiment}; ưu tiên quan sát thêm thanh khoản và nhóm dẫn dắt.`;

      bulletinOutputEl.innerHTML = [
        "<h3>BẢN TIN BROKER HÔM NAY</h3>",
        "<h4>1. Bối cảnh thị trường</h4>",
        `<p>${escapeHtml(contextLine)}</p>`,
        "<p>Các tín hiệu trong ngày nên được kiểm tra cùng giá, thanh khoản và mức độ lan tỏa trước khi đưa vào tư vấn.</p>",
        "<h4>2. Tin rủi ro cần cảnh báo</h4>",
        summarizeDetailedHtml(riskItems, 5),
        "<h4>3. Tin đáng chú ý theo mã/ngành</h4>",
        summarizeDetailedHtml(tickerSectorItems, 7),
        "<h4>4. Vĩ mô/ngành cần theo dõi</h4>",
        summarizeDetailedHtml(macroSectorItems, 5),
        "<h4>5. Tin nhiễu/giá trị thấp đã loại bỏ</h4>",
        `<p>- Đang ẩn ${escapeHtml(noiseHidden)} tin nhiễu như ETF/NAV, hoán đổi hoặc thông báo kỹ thuật giá trị tư vấn thấp.</p>`,
        "<h4>6. Định hướng hành động</h4>",
        "<ul>",
        "<li>Ưu tiên an toàn vốn.</li>",
        "<li>Không FOMO với tin tích cực đơn lẻ.</li>",
        "<li>Chờ xác nhận kỹ thuật, giá và thanh khoản.</li>",
        "<li>Với mã có tin rủi ro, kiểm tra tỷ trọng và mức chịu rủi ro.</li>",
        "</ul>",
      ].join("");

      state.bulletinGenerated = true;
      state.bulletinCollapsed = false;
      bulletinEl.classList.add("visible");
      bulletinToggleButtonEl.hidden = false;
      bulletinToggleButtonEl.textContent = "Thu gọn bản tin";
    }

    function toggleBulletin() {
      if (!state.bulletinGenerated) return;
      state.bulletinCollapsed = !state.bulletinCollapsed;
      bulletinEl.classList.toggle("visible", !state.bulletinCollapsed);
      bulletinToggleButtonEl.textContent = state.bulletinCollapsed ? "Mở lại bản tin" : "Thu gọn bản tin";
    }

    function bindEvents() {
      tabsToggleEl.addEventListener("click", () => {
        state.tabsExpanded = !state.tabsExpanded;
        renderTabs();
      });

      letterFilterEl.addEventListener("click", (event) => {
        const button = event.target.closest("[data-letter]");
        if (!button) return;
        state.tickerLetter = state.tickerLetter === button.dataset.letter ? "all" : button.dataset.letter;
        renderLetterFilter();
        applyFilterChange();
      });

      timeFilterEl.addEventListener("change", () => {
        state.timeSort = ["newest", "oldest"].includes(timeFilterEl.value) ? timeFilterEl.value : "default";
        applyFilterChange();
      });

      scoreFilterEl.addEventListener("change", () => {
        state.scoreSort = ["score_desc", "score_asc"].includes(scoreFilterEl.value) ? scoreFilterEl.value : "default";
        applyFilterChange();
      });

      sourceScopeFilterEl.addEventListener("change", () => {
        state.sourceScope = sourceScopeFilterEl.value === "extended" ? "extended" : "trusted";
        applyFilterChange();
      });

      summaryEl.addEventListener("click", (event) => {
        const button = event.target.closest("[data-summary-filter]");
        if (!button) return;
        const nextFilter = button.dataset.summaryFilter;
        state.summaryFilter = state.summaryFilter === nextFilter ? "all" : nextFilter;
        applyFilterChange();
      });

      tabsEl.addEventListener("click", (event) => {
        const button = event.target.closest("[data-view]");
        if (!button) return;
        state.view = state.view === button.dataset.view ? "all" : button.dataset.view;
        renderTabs();
        applyFilterChange();
      });

      document.querySelectorAll("[data-priority]").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll("[data-priority]").forEach((el) => el.classList.remove("active"));
          button.classList.add("active");
          state.priority = button.dataset.priority;
          applyFilterChange();
        });
      });

      tickerSearchEl.addEventListener("input", () => {
        state.ticker = tickerSearchEl.value.trim();
        applyFilterChange();
      });

      clearSearchEl.addEventListener("click", () => {
        clearFilter("search");
        tickerSearchEl.focus();
      });

      resetFiltersEl.addEventListener("click", resetFilters);

      activeFilterBarEl.addEventListener("click", (event) => {
        const clearButton = event.target.closest("[data-clear-filter]");
        if (clearButton) {
          clearFilter(clearButton.dataset.clearFilter);
          return;
        }
        if (event.target.closest("#active-reset-filters")) resetFilters();
      });

      [
        [newsTypeFilterEl, "newsType"],
        [sectorFilterEl, "sector"],
        [marketSentimentFilterEl, "marketSentiment"],
        [impactHorizonFilterEl, "impactHorizon"],
        [signalStrengthFilterEl, "signalStrength"],
        [brokerDecisionFilterEl, "brokerDecision"],
        [sourceFilterEl, "source"],
      ].forEach(([element, key]) => {
        element.addEventListener("change", () => {
          state[key] = element.value;
          applyFilterChange();
        });
      });

      showNoiseToggleEl.addEventListener("change", () => {
        state.showNoise = showNoiseToggleEl.checked;
        applyFilterChange();
      });

      listEl.addEventListener("click", (event) => {
        if (event.target.closest("[data-reset-filters]")) {
          resetFilters();
          return;
        }
        const detailButton = event.target.closest("[data-open-detail]");
        if (!detailButton) return;
        event.preventDefault();
        event.stopPropagation();
        openDetail(detailButton.dataset.openDetail);
      });

      dashboardEl.addEventListener("click", (event) => {
        const row = event.target.closest("[data-source-url]");
        if (!row) return;
        window.open(row.dataset.sourceUrl, "_blank", "noopener,noreferrer");
      });

      detailCloseEl.addEventListener("click", closeDetail);
      detailBackdropEl.addEventListener("click", (event) => {
        if (event.target === detailBackdropEl) closeDetail();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeDetail();
      });

      timelineToggleButtonEl.addEventListener("click", () => {
        state.timelineMode = !state.timelineMode;
        renderItems();
      });
      bulletinButtonEl.addEventListener("click", createBrokerBulletin);
      bulletinToggleButtonEl.addEventListener("click", toggleBulletin);
      loadMoreButtonEl.addEventListener("click", loadMoreItems);
      newNewsButtonEl.addEventListener("click", () => {
        hideNewNewsNotice();
        renderItems();
      });
      window.addEventListener("scroll", maybeLoadMoreOnScroll, {passive: true});
    }

    function start() {
      renderTabs();
      renderLetterFilter();
      bindEvents();
      loadNewsCache();
      state.firstPageReady = state.masterNewsStore.length > 0;
      if (state.firstPageReady) {
        refreshFilterOptions();
        renderItems();
      }
      if (!ensureFirebaseInitialized()) {
        statusEl.textContent = "Không tải được Firebase SDK.";
        return;
      }

      db = firebase.firestore();
      updateLoadMoreState();

      db.collection("news")
        .orderBy("publishedAt", "desc")
        .limit(PAGE_SIZE)
        .onSnapshot((snapshot) => {
          const incoming = snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
          const shouldRender = isNearTop() || !state.firstPageReady;
          const added = mergeIntoMasterStore(incoming, {deferRender: !shouldRender});
          state.firstPageReady = true;
          refreshFilterOptions();
          if (shouldRender || !added) {
            if (shouldRender) hideNewNewsNotice();
            renderItems();
          }
        }, (error) => {
          state.firstPageReady = true;
          statusEl.textContent = `Lỗi Firestore: ${error.message}`;
          updateLoadMoreState();
        });

      state.syncTimer = window.setInterval(() => syncNewerItems(), AUTO_SYNC_INTERVAL_MS);
    }

    window.addEventListener("load", start);
  </script>
</body>
</html>
