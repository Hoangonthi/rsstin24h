  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #111827;
      --panel-soft: rgba(17, 24, 39, 0.72);
      --border: rgba(148, 163, 184, 0.22);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --good: #86efac;
      --warn: #facc15;
      --bad: #fb7185;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button, input, select {
      font: inherit;
      color: inherit;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.92);
      border-radius: 7px;
    }
    button {
      min-height: 36px;
      padding: 0 12px;
      cursor: pointer;
      font-weight: 650;
      line-height: 1;
      white-space: nowrap;
    }
    button:hover { border-color: rgba(56, 189, 248, 0.5); }
    button.active { border-color: rgba(56, 189, 248, 0.78); background: rgba(14, 116, 144, 0.28); color: #e0f2fe; }
    input, select { min-height: 38px; padding: 0 11px; width: 100%; }
    .shell { width: min(1180px, calc(100% - 28px)); margin: 0 auto; padding: 20px 0 28px; }
    header { display: grid; place-items: center; text-align: center; gap: 12px; margin-bottom: 14px; }
    h1 {
      margin: 0;
      font-size: clamp(1.45rem, 2.4vw, 2rem);
      line-height: 1.15;
      letter-spacing: 0;
      font-weight: 760;
    }
    .subtext { margin: 0; color: var(--muted); font-size: 0.9rem; }
    .search-row { width: min(680px, 100%); display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; }
    .tabs, .view-switch, .filters {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 12px 0;
    }
    .tabs button {
      min-width: 128px;
      justify-content: center;
      font-size: 0.94rem;
      border-color: rgba(148, 163, 184, 0.28);
    }
    .filters { display: grid; grid-template-columns: repeat(3, minmax(180px, 1fr)); gap: 8px; }
    .status { margin: 9px 0; color: var(--muted); font-size: 0.82rem; text-align: center; }
    .summary { display: none !important; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; margin: 12px 0; }
    .summary-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-soft);
      padding: 9px 10px;
    }
    .summary-card strong { display: block; font-size: 1.1rem; }
    .summary-card span { color: var(--muted); font-size: 0.76rem; }
    .news-list {
      display: grid;
      gap: 0;
      width: 100%;
      max-width: 100%;
      overflow: hidden;
    }
    .news-row {
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr) 22px auto;
      align-items: start;
      column-gap: 2px;
      row-gap: 0;
      min-height: 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      padding: 4px 6px;
    }
    .news-side {
      display: grid;
      gap: 2px;
      min-width: 0;
    }
    .news-code-cell {
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
      color: #bbf7d0;
      white-space: nowrap;
      font-size: 0.68rem;
      line-height: 1.25;
      font-weight: 650;
      text-align: right;
      justify-self: start;
    }
    .news-time {
      color: var(--muted);
      font-size: 0.74rem;
      line-height: 1.35;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .news-codes {
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
      color: #bbf7d0;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.68rem;
      line-height: 1.25;
      font-weight: 650;
    }
    .news-main {
      display: grid;
      gap: 2px;
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
    }
    .news-title {
      display: block;
      width: 100%;
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
      color: #7dd3fc;
      text-decoration: none;
      font-size: 0.82rem;
      line-height: 1.18;
      font-weight: 400;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .news-title:hover { color: #bae6fd; text-decoration: underline; }
    .news-title.read { color: #a78bfa; opacity: 0.82; }
    .news-title-text {
      display: inline;
    }
    .news-title .news-source-inline {
      color: #94a3b8;
      float: right;
      font-weight: 400;
      margin-left: 8px;
      white-space: nowrap;
    }
    .news-source {
      display: inline;
      min-width: 0;
      overflow: hidden;
      color: var(--muted);
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.7rem;
      line-height: 1.25;
    }
    .news-meta { display: inline-flex; align-items: center; gap: 5px; min-width: 0; }
    .pill {
      display: inline-flex;
      align-items: center;
      max-width: 160px;
      min-height: 18px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 999px;
      color: #cbd5e1;
      padding: 0 7px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.68rem;
      font-weight: 650;
    }
    .pill.fx { border-color: rgba(96, 165, 250, 0.42); color: #dbeafe; }
    .pill.hot { border-color: rgba(251, 113, 133, 0.44); color: #fecdd3; }
    .pill.good { border-color: rgba(34, 197, 94, 0.34); color: #bbf7d0; }
    .source-board { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px 24px; }
    .source-column { min-width: 0; }
    .source-column h2 { margin: 0; color: #cbd5e1; font-size: 0.98rem; }
    .source-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .source-count { color: var(--muted); font-size: 0.68rem; font-weight: 700; white-space: nowrap; }
    .source-list { display: grid; gap: 4px; }
    .source-more {
      width: 100%;
      margin-top: 6px;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid rgba(56, 189, 248, 0.32);
      background: rgba(14, 165, 233, 0.08);
      color: #7dd3fc;
      font-size: 0.72rem;
      font-weight: 800;

    }
    .source-more:hover { border-color: rgba(56, 189, 248, 0.72); background: rgba(14, 165, 233, 0.16); }
    .telegram-action {
      min-height: 26px;
      padding: 0 8px;
      border-color: rgba(34, 197, 94, 0.38);
      background: rgba(22, 101, 52, 0.22);

      font-size: 0.7rem;

    }
    .modal-backdrop {
      position: fixed;

      display: grid;
      place-items: center;

      background: rgba(2, 6, 23, 0.7);
    }
    .modal {
      width: min(560px, 100%);
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0f172a;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      padding: 14px;
    }
    .modal h2 { margin: 0 0 8px; font-size: 1rem; color: #e0f2fe; }
    .modal-title { margin: 0 0 12px; color: var(--muted); font-size: 0.82rem; line-height: 1.4; }
    .telegram-groups { display: grid; gap: 7px; max-height: 260px; overflow: auto; }
    .telegram-group-option {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 7px;
      background: rgba(15, 23, 42, 0.72);
      padding: 8px;
    }
    .telegram-group-option input { width: auto; min-height: auto; }
    .telegram-group-option strong { display: block; font-size: 0.84rem; }
    .telegram-group-option span { display: block; color: var(--muted); font-size: 0.74rem; overflow-wrap: anywhere; }
    .telegram-history { margin-top: 10px; color: var(--muted); font-size: 0.78rem; line-height: 1.45; }
    .modal-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; margin-top: 13px; }
    .source-item {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr) 22px auto;
      gap: 3px;
      align-items: start;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      padding-bottom: 4px;
    }
    .empty {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-soft);
      color: var(--muted);
      padding: 20px;
      text-align: center;
    }
    .load-more { display: flex; justify-content: center; margin: 14px 0 0; }
    .hidden { display: none !important; }
    @media (max-width: 720px) {
      body { font-size: 14px; }
      .shell {
        width: 100%;
        max-width: 100%;

      }

      .subtext { max-width: 320px; font-size: 0.86rem; line-height: 1.35; }
      .search-row { grid-template-columns: 1fr; }
      .search-row button[hidden] { display: none; }
      .tabs {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        width: 100%;
      }
      .tabs button {
        width: 100%;
        min-width: 0;
        min-height: 34px;
        padding-inline: 4px;
        font-size: 0.76rem;
        font-weight: 720;
        border-color: rgba(148, 163, 184, 0.34);
        background: rgba(15, 23, 42, 0.94);
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tabs button.active {
        border-color: rgba(56, 189, 248, 0.95);
        background: rgba(3, 105, 161, 0.68);
        color: #f0f9ff;

      }
      .view-switch {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 96px));
        justify-content: center;
        width: 100%;
        gap: 8px;
      }
      .view-switch button {
        width: 100%;
        min-width: 0;
        padding-inline: 6px;
        font-size: 0.82rem;
      }
      .filters {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        width: 100%;
      }
      .filters select {
        min-height: 34px;
        padding-inline: 7px;
        font-size: 0.76rem;
        border-color: rgba(148, 163, 184, 0.34);
      }
      .status,
      .summary {

      }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .news-row {
        grid-template-columns: 28px minmax(0, 1fr) 22px;
        column-gap: 2px;
        row-gap: 0;
        min-height: 0;
        width: 100%;
        max-width: 100%;
        padding: 2px 0 3px;
        overflow: hidden;
      }
      .news-row > * {
        min-width: 0;
        max-width: 100%;
      }
      .news-side {
        width: 28px;
        max-width: 28px;
        overflow: hidden;
      }
      .news-code-cell {
        font-size: 0.64rem;
        line-height: 1.12;
        overflow: hidden;
        justify-self: start;
      }
      .news-main {
        width: 100%;
        max-width: 100%;
        min-width: 0;
        overflow: hidden;
        gap: 0;
      }
      .news-title {
        width: 100%;
        max-width: calc(100vw - 76px);
        font-size: 0.78rem;
        line-height: 1.12;
        overflow: hidden;
        display: block;
        contain: inline-size;
      }
      .news-title-text {
        display: inline;
      }
      .news-title .news-source-inline {
        font-size: 0.68rem;
        margin-left: 6px;
      }
      .news-time {
        font-size: 0.68rem;
        line-height: 1.16;
      }
      .news-codes {
        font-size: 0.64rem;
        line-height: 1.12;
      }
      .news-source {
        font-size: 0.66rem;
        line-height: 1.12;
      }
      .news-meta { display: none; }
      .source-board { grid-template-columns: 1fr; }
      .source-item {
        grid-template-columns: 28px minmax(0, 1fr) 22px;
        gap: 2px;
        overflow: hidden;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>Radar thị trường</h1>
        <p class="subtext">Cập nhật tin tức đa nguồn hỗ trợ nhà đầu tư.</p>
      </div>
      <div class="search-row">
        <input id="search-input" type="search" placeholder="Tìm mã, tiêu đề, nguồn hoặc từ khóa...">
        <button id="clear-search" type="button" hidden>Xóa</button>
      </div>
    </header>

    <nav id="channel-tabs" class="tabs" aria-label="Nhóm tin"></nav>
    <section class="filters" aria-label="Bộ lọc">
      <select id="sector-filter"><option value="all">Tất cả nhóm</option></select>
      <select id="source-filter"><option value="all">Tất cả nguồn</option></select>
      <select id="sort-filter">
        <option value="newest">Mới nhất</option>
        <option value="oldest">Cũ nhất</option>
      </select>
    </section>
    <div class="view-switch">
      <button id="view-news" type="button" class="active">News</button>
      <button id="view-source" type="button">Nguồn</button>
      <button id="refresh-button" type="button">Làm mới</button>
    </div>
    <div id="status" class="status">Đang tải dữ liệu...</div>
    <section id="summary" class="summary"></section>
    <section id="news-list" class="news-list"></section>
    <section class="load-more">
      <button id="load-more" type="button" hidden>Tải thêm</button>
    </section>
  </main>

  <div id="telegram-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="telegram-modal-title">
    <div class="modal">
      <h2 id="telegram-modal-title">Đẩy Telegram</h2>
      <p id="telegram-modal-news" class="modal-title"></p>
      <div id="telegram-groups" class="telegram-groups"></div>
      <div id="telegram-history" class="telegram-history"></div>
      <div class="modal-actions">
        <button id="telegram-cancel" type="button">Hủy</button>
        <button id="telegram-send-all" class="telegram-action" type="button">📢 Gửi tất cả nhóm</button>
        <button id="telegram-confirm" class="telegram-action" type="button">Xác nhận đẩy</button>
      </div>
    </div>
  </div>

  <script>
    const PAGE_SIZE = 500;
    const RENDER_STEP = 120;
    const SOURCE_PREVIEW_LIMIT = 10;
    const READ_LINKS_KEY = "radarMarket.readLinks.v1";
    const ALLOWED_ADMIN_EMAILS = ["vvhoangvn@gmail.com"];
    const CHANNELS = [
      {id: "market", label: "Thị trường"},
      {id: "stocks", label: "Cổ phiếu"},
      {id: "fx", label: "FX/GOLD"},
      {id: "all", label: "Tất cả"},
    ];

    let db = null;
    let currentUser = null;
    const state = {
      rawItems: [],
      items: [],
      adminOverrides: [],
      telegramGroups: [],
      telegramLogs: [],
      telegramPushedNews: new Map(),
      telegramAutoPushedNews: new Map(),
      telegramAutoPushEnabled: false,
      telegramAutoPushInFlight: false,
      telegramAutoPushLastRunAt: 0,
      telegramDialogNewsId: "",
      isAdmin: false,
      channel: "market",
      view: "news",
      query: "",
      sector: "all",
      source: "all",
      sort: "newest",
      renderLimit: RENDER_STEP,
      expandedSources: new Set(),
      readLinks: loadReadLinks(),
    };

    const els = {
      search: document.getElementById("search-input"),
      clearSearch: document.getElementById("clear-search"),
      channelTabs: document.getElementById("channel-tabs"),
      sector: document.getElementById("sector-filter"),
      source: document.getElementById("source-filter"),
      sort: document.getElementById("sort-filter"),
      viewNews: document.getElementById("view-news"),
      viewSource: document.getElementById("view-source"),
      refresh: document.getElementById("refresh-button"),
      status: document.getElementById("status"),
      summary: document.getElementById("summary"),
      list: document.getElementById("news-list"),
      loadMore: document.getElementById("load-more"),
      telegramModal: document.getElementById("telegram-modal"),
      telegramNews: document.getElementById("telegram-modal-news"),
      telegramGroups: document.getElementById("telegram-groups"),
      telegramHistory: document.getElementById("telegram-history"),
      telegramCancel: document.getElementById("telegram-cancel"),
      telegramSendAll: document.getElementById("telegram-send-all"),
      telegramConfirm: document.getElementById("telegram-confirm"),
    };

    function normalizeText(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\u0111/g, "d")
        .replace(/\u0110/g, "D")
        .toLowerCase();
    }

    function normalizedTitleKey(value) {
      return normalizeText(fixMojibake(value))
        .replace(/[^a-z0-9]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      })[char]);
    }

    function toDate(value) {
      if (!value) return null;
      if (typeof value.toDate === "function") return value.toDate();
      const date = value instanceof Date ? value : new Date(value);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function timeMs(value) {
      const date = toDate(value);
      return date ? date.getTime() : 0;
    }

    function formatTime(value) {
      const date = toDate(value);
      if (!date) return "--:--";
      return date.toLocaleTimeString("vi-VN", {hour: "2-digit", minute: "2-digit", hour12: false});
    }

    function normalizeUrl(url) {
      return String(url || "").split("#")[0].trim();
    }

    function loadReadLinks() {
      try {
        const parsed = JSON.parse(localStorage.getItem(READ_LINKS_KEY) || "[]");
        return new Set(Array.isArray(parsed) ? parsed.map(normalizeUrl).filter(Boolean) : []);
      } catch {
        return new Set();
      }
    }

    function saveReadLinks() {
      try {
        localStorage.setItem(READ_LINKS_KEY, JSON.stringify(Array.from(state.readLinks).slice(-1000)));
      } catch {}
    }

    function markRead(url) {
      const key = normalizeUrl(url);
      if (!key) return;
      state.readLinks.add(key);
      saveReadLinks();
    }

    function readablePublicUrl(url) {
      const value = String(url || "").trim();
      if (/^https?:\/\/api\.hsx\.vn\/tin-tuc\//i.test(value)) {
        return value.replace(/^https?:\/\/api\.hsx\.vn/i, "https://www.hsx.vn");
      }
      if (/^https?:\/\/www\.hnx\.vn:7978\//i.test(value)) {
        return value.replace(/^https?:\/\/www\.hnx\.vn:7978/i, "https://www.hnx.vn");
      }
      if (/^https?:\/\/hnx\.vn:7978\//i.test(value)) {
        return value.replace(/^https?:\/\/hnx\.vn:7978/i, "https://www.hnx.vn");
      }
      return "";
    }

    function itemUrl(item) {
      const candidates = [item.publicUrl, item.displayUrl, item.link, item.url, item.originalUrl, item.canonicalUrl];
      const fixedUrl = candidates.map(readablePublicUrl).find(Boolean);
      if (fixedUrl) return fixedUrl;
      const directUrl = candidates.find((url) => String(url || "").trim());
      if (directUrl) return directUrl;
      return "";
    }

    function shortSource(source) {
      const value = String(source || "Unknown").trim();
      if (/^HOSE|^HSX/i.test(value)) return "HOSE";
      if (/^HNX/i.test(value)) return "HNX";
      if (/^VnEconomy/i.test(value)) return "VnEconomy";
      if (/^Vietstock/i.test(value)) return "Vietstock";
      if (/^CoinDesk/i.test(value)) return "CoinDesk";
      if (/^Cointelegraph/i.test(value)) return "Cointelegraph";
      if (/^CryptoSlate/i.test(value)) return "CryptoSlate";
      if (/^Cryptonews/i.test(value)) return "Cryptonews";
      if (/^Bitcoin News/i.test(value)) return "Bitcoin News";
      return value.split(/\s+-\s+|\s+\|\s+/)[0] || value;
    }

    function itemSource(item) {
      const fields = [
        item.sourceId,
        item.sourceUrl,
        item.publicUrl,
        item.displayUrl,
        item.link,
        item.url,
        item.originalUrl,
        item.canonicalUrl,
        item.sourceName,
        item.source,
        item.originalSource,
      ];
      const text = normalizeText(fields.filter(Boolean).join(" "));
      if (/\bhnx\b|hnx\.vn|hnx_/.test(text)) return "HNX";
      if (/\bhose\b|\bhsx\b|api\.hsx\.vn|hsx\.vn|hose_/.test(text)) return "HOSE";
      return shortSource(item.source || item.sourceName || item.originalSource);
    }

    function listField(item, keys) {
      for (const key of keys) {
        const value = item[key];
        if (Array.isArray(value) && value.length) return value.filter(Boolean);
        if (value) return [value];
      }
      return [];
    }

    function unique(values) {
      return Array.from(new Set(values.map((value) => String(value || "").trim()).filter(Boolean)));
    }

    function fixMojibake(value) {
      return String(value || "")
        .replace(/Chá»©ng khoÃ¡n/g, "Chứng khoán")
        .replace(/Thá»‹ trÆ°á»ng/g, "Thị trường")
        .replace(/TÃ i chÃ­nh/g, "Tài chính")
        .replace(/VÄ© mÃ´/g, "Vĩ mô")
        .replace(/Doanh nghiá»‡p/g, "Doanh nghiệp")
        .replace(/Báº¥t Ä‘á»™ng sáº£n/g, "Bất động sản")
        .replace(/PhÃ¢n tÃ­ch/g, "Phân tích")
        .replace(/PhÃ¡p luáº­t/g, "Pháp luật")
        .replace(/Äá»i sá»‘ng/g, "Đời sống")
        .replace(/GiÃ¡o dá»¥c/g, "Giáo dục")
        .replace(/Dáº§u khÃ­/g, "Dầu khí")
        .replace(/ThÃ©p/g, "Thép")
        .replace(/Chá»©ng khoÃ¡n/g, "Chứng khoán");
    }

    const CRYPTO_TICKERS = new Set([
      "BTC", "ETH", "XRP", "BNB", "SOL", "ADA", "DOGE", "TRX", "TON", "AVAX",
      "LINK", "DOT", "MATIC", "POL", "LTC", "BCH", "UNI", "AAVE", "ATOM",
      "NEAR", "ICP", "APT", "SUI", "ARB", "OP", "ETC", "FIL", "XLM",
      "USDT", "USDC", "DAI", "FDUSD", "USD", "EUR", "DXY", "XAU", "XAG", "GOLD"
    ]);

    function cryptoLikeSource(item) {
      const text = normalizeText([
        item.source,
        item.sourceName,
        item.sourceId,
        item.originalSource,
        itemSector(item),
      ].filter(Boolean).join(" "));
      return /coindesk|cryptoslate|cryptonews|cointelegraph|bitcoin news|bitcoin_news|crypto|bitcoin|fx|gold/.test(text);
    }

    function titlePrefixTickers(item) {
      const titles = unique([
        item.titleOriginal,
        item.originalTitle,
        item.title,
        displayTitle(item),
      ]);
      return unique([
        ...titles
        .map((title) => String(title || "").match(/^\s*([A-Z][A-Z0-9]{1,11})\s*[:：]/)?.[1])
          .filter(Boolean),
        ...titles.map(warrantTickerFromTitle).filter(Boolean),
      ]);
    }

    function warrantTickerFromTitle(title) {
      const raw = String(title || "");
      if (!/\bch(?:u|ư)ng\s+quy(?:e|ề)n\b|\bchung\s+quyen\b/i.test(normalizeText(raw))) return "";
      const dotted = raw.match(/\b([A-Z]{2,5})\.[A-Z0-9]{2,}(?:\.|$)/);
      if (dotted) return dotted[1].toUpperCase();
      const afterPhrase = raw.match(/ch(?:ứ|u)ng\s+quy(?:ề|e)n[^A-Z0-9]{0,40}\b([A-Z]{2,5})\b/i);
      return afterPhrase ? afterPhrase[1].toUpperCase() : "";
    }

    function firstCodeFromTitle(title) {
      const blocked = new Set(["HOSE", "HNX", "UPCOM", "ETF", "VN", "USD", "VND", "CEO", "HĐQT", "HDQT", "ĐHĐCĐ", "DHDCD"]);
      const matches = String(title || "").match(/\b[A-Z]{2,5}\b/g) || [];
      return matches.find((code) => !blocked.has(code.toUpperCase())) || "";
    }

    function dottedUnderlyingFromTitle(title) {
      return String(title || "").match(/\b([A-Z]{2,5})\.[A-Z0-9]{2,}(?:\.|$)/)?.[1]?.toUpperCase() || "";
    }

    function autoTickerFromRule(rule, item) {
      const title = [
        item.titleOriginal,
        item.originalTitle,
        item.title,
        displayTitle(item),
      ].filter(Boolean).join(" ");
      const mode = rule.autoTickerMode || "";
      if (!mode) return [];
      if (mode === "warrant_underlying") return [warrantTickerFromTitle(title)].filter(Boolean);
      if (mode === "dotted_underlying") return [dottedUnderlyingFromTitle(title)].filter(Boolean);
      if (mode === "first_code") return [firstCodeFromTitle(title)].filter(Boolean);
      if (mode === "regex" && rule.autoTickerRegex) {
        try {
          const match = title.match(new RegExp(rule.autoTickerRegex, "i"));
          return [match?.[1] || match?.[0]].filter(Boolean).map((code) => String(code).toUpperCase());
        } catch {
          return [];
        }
      }
      return [];
    }

    function isWarrantTitle(item) {
      return Boolean(warrantTickerFromTitle([
        item.titleOriginal,
        item.originalTitle,
        item.title,
        displayTitle(item),
      ].filter(Boolean).join(" ")));
    }

    function itemTickers(item) {
      const storedCodes = (item.adminOverrideApplied || item.isManual)
        ? [
          ...listField(item, ["primaryTickers", "finalTickers", "tickers"]),
          item.primaryTicker,
          ...listField(item, ["relatedStocks", "relatedTickers", "watchlistStocks"]),
        ]
        : [];
      const codes = unique([
        ...titlePrefixTickers(item),
        ...storedCodes,
      ]).map((code) => code.toUpperCase()).filter((code) => /^[A-Z0-9]{2,12}$/.test(code));
      return cryptoLikeSource(item) ? codes.filter((code) => CRYPTO_TICKERS.has(code)) : codes;
    }

    function itemSector(item) {
      if (isWarrantTitle(item)) return "Chứng khoán";
      return fixMojibake(item.finalSector || item.sector || item.categoryGroup || item.category || "Khác");
    }

    function displayTitle(item) {
      return item.titleVi || item.translatedTitle || item.title || item.titleOriginal || "Không có tiêu đề";
    }

    function duplicateTitleKey(item) {
      return normalizedTitleKey([
        displayTitle(item),
        item.title,
        item.titleOriginal,
        item.originalTitle,
      ].filter(Boolean)[0]);
    }

    function displaySummary(item) {
      return item.summaryVi || item.translatedSummary || item.summary || item.shortDescription || item.description || "";
    }

    function telegramLogsForNews(newsId) {
      return state.telegramLogs.filter((log) => log.newsId === newsId);
    }

    function telegramGroupName(groupId) {
      const group = state.telegramGroups.find((item) => item.id === groupId);
      return group?.name || groupId;
    }

    function telegramHistoryText(newsId) {
      const autoPush = state.telegramAutoPushedNews.get(newsId);
      if (autoPush) return `Đã tự đẩy Telegram: ${autoPush.join(", ")}`;
      const localPush = state.telegramPushedNews.get(newsId);
      if (localPush) return `Đã đẩy Telegram: ${localPush.join(", ")}`;
      const logs = telegramLogsForNews(newsId).filter((log) => log.status === "success" || log.status === "partial");
      if (!logs.length) return "";
      const names = unique(logs.flatMap((log) => Array.isArray(log.groupIds) ? log.groupIds.map(telegramGroupName) : []));
      return names.length ? `Đã đẩy Telegram: ${names.join(", ")}` : "Đã đẩy Telegram";
    }

    function telegramActionHtml(item) {
      if (!state.isAdmin) return "";
      const pushed = telegramHistoryText(item.id);
      const autoPushed = state.telegramAutoPushedNews.has(item.id);
      return `
        ${pushed ? `<span class="telegram-state" title="${escapeHtml(pushed)}">${autoPushed ? "Đã tự đẩy Telegram" : "Đã đẩy Telegram"}</span>` : ""}
        <button class="telegram-action" type="button" data-telegram-push="${escapeHtml(item.id)}">Đẩy Telegram</button>
      `;
    }

    function searchableText(item) {
      return normalizeText([
        displayTitle(item),
        item.title,
        item.titleOriginal,
        item.originalTitle,
        displaySummary(item),
        item.source,
        item.sourceName,
        item.sourceId,
        itemSector(item),
        item.category,
        item.eventType,
        item.newsType,
        itemTickers(item).join(" "),
      ].filter(Boolean).join(" "));
    }

    function titleSearchText(item) {
      return normalizeText([
        displayTitle(item),
        item.title,
        item.titleOriginal,
        item.originalTitle,
      ].filter(Boolean).join(" "));
    }

    function phraseExpressionMatches(target, phraseSlots = [], joiners = []) {
      const slots = phraseSlots.map((phrase, index) => ({phrase, index})).filter((slot) => slot.phrase);
      if (!slots.length) return false;
      const groups = [[]];
      slots.forEach((slot, slotIndex) => {
        if (slotIndex > 0) {
          const previousOriginalIndex = slots[slotIndex - 1].index;
          if ((joiners[previousOriginalIndex] || "AND") === "OR") groups.push([]);
        }
        groups[groups.length - 1].push(slot.phrase);
      });
      return groups.some((group) => group.every((phrase) => target.includes(phrase)));
    }

    function adminOverrideMatches(rule, item) {
      if (!rule || rule.active === false) return false;
      const target = normalizeText(rule.scope === "full_text"
        ? `${displayTitle(item)} ${item.title || ""} ${item.titleOriginal || ""} ${displaySummary(item)}`
        : `${displayTitle(item)} ${item.title || ""} ${item.titleOriginal || ""}`)
        .replace(/\s+/g, " ")
        .trim();
      if (!target) return false;
      const phraseSlots = (Array.isArray(rule.normalizedPhraseSlots) && rule.normalizedPhraseSlots.length ? rule.normalizedPhraseSlots : (rule.phraseSlots || []).map(normalizeText))
        .map((phrase) => normalizeText(phrase).replace(/\s+/g, " ").trim());
      if (phraseSlots.some(Boolean)) return phraseExpressionMatches(target, phraseSlots, rule.phraseJoiners || ["AND", "AND"]);
      const phrases = (rule.normalizedPhrases && rule.normalizedPhrases.length ? rule.normalizedPhrases : (rule.phrases || [rule.titlePattern]).map(normalizeText))
        .map((phrase) => normalizeText(phrase).replace(/\s+/g, " ").trim())
        .filter(Boolean);
      if (!phrases.length) return false;
      const mode = rule.matchMode || (phrases.length > 1 ? "ordered_terms" : "contains_phrase");
      if (mode === "exact_title") return target === phrases[0];
      if (mode === "starts_with") return target.startsWith(phrases[0]);
      if (mode === "all_terms") return phrases.every((phrase) => target.includes(phrase));
      if (mode === "ordered_terms") {
        let from = 0;
        return phrases.every((phrase) => {
          const index = target.indexOf(phrase, from);
          if (index < 0) return false;
          from = index + phrase.length;
          return true;
        });
      }
      return phrases.some((phrase) => target.includes(phrase));
    }

    function applyAdminOverrides(item) {
      const matched = state.adminOverrides.find((rule) => adminOverrideMatches(rule, item));
      if (!matched) return item;
      const autoTickers = autoTickerFromRule(matched, item);
      const primaryTickers = unique([
        ...autoTickers,
        ...(Array.isArray(matched.primaryTickers) ? matched.primaryTickers : []),
        matched.primaryTicker,
      ]).map((code) => String(code).toUpperCase()).filter(Boolean);
      const relatedStocks = unique([
        ...autoTickers,
        ...(Array.isArray(matched.relatedStocks) ? matched.relatedStocks : []),
        ...(Array.isArray(matched.watchlistStocks) ? matched.watchlistStocks : []),
      ]).map((code) => String(code).toUpperCase()).filter(Boolean);
      return {
        ...item,
        finalSector: matched.finalSector || matched.sector || item.finalSector,
        sector: matched.finalSector || matched.sector || item.sector,
        primaryTicker: primaryTickers[0] || item.primaryTicker,
        primaryTickers: primaryTickers.length ? primaryTickers : item.primaryTickers,
        relatedStocks: relatedStocks.length ? relatedStocks : item.relatedStocks,
        eventType: matched.eventType || item.eventType,
        sentiment: matched.sentiment || item.sentiment,
        impactLevel: matched.impactLevel || item.impactLevel,
        adminOverrideApplied: true,
      };
    }

    function normalizeItem(doc) {
      const item = applyAdminOverrides({...doc});
      item.id = String(item.id || item.docId || item.uniqueKey || itemUrl(item) || displayTitle(item));
      item.source = item.source || item.sourceName || item.originalSource || "Unknown";
      item.publishedAt = item.publishedAt || item.createdAt || null;
      return item;
    }

    function dedupeDisplayItems(items) {
      const seenTitles = new Set();
      const seenUrls = new Set();
      const ordered = [...items].sort((a, b) => timeMs(b.publishedAt || b.createdAt) - timeMs(a.publishedAt || a.createdAt));
      return ordered.filter((item) => {
        const titleKey = duplicateTitleKey(item);
        const urlKey = normalizeUrl(itemUrl(item));
        if (titleKey && seenTitles.has(titleKey)) return false;
        if (urlKey && seenUrls.has(urlKey)) return false;
        if (titleKey) seenTitles.add(titleKey);
        if (urlKey) seenUrls.add(urlKey);
        return true;
      });
    }

    function isFxItem(item) {
      const sourceText = normalizeText([item.source, item.sourceName, item.sourceId, item.originalSource].filter(Boolean).join(" "));
      const sectorText = normalizeText(itemSector(item));
      const titleText = titleSearchText(item);
      if (/coindesk|cryptoslate|cryptonews|cointelegraph|bitcoin news|bitcoin_news/.test(sourceText)) return true;
      if (/\b(fx|crypto)\b/.test(sectorText)) return true;
      return /\b(bitcoin|btc|ethereum|eth|xrp|stablecoin|usdt|usdc|binance|coinbase|crypto|tien ma hoa|tien ao|vang|gia vang|gold|xau)\b/.test(titleText);
    }

    function isStockItem(item) {
      const text = searchableText(item);
      return itemTickers(item).length > 0 || /hose|hnx|upcom|co phieu|chung khoan|niem yet|giao dich/.test(text);
    }

    function matchesChannel(item) {
      if (state.channel === "all") return true;
      if (state.channel === "fx") return isFxItem(item);
      if (state.channel === "stocks") return isStockItem(item);
      return !isFxItem(item);
    }

    function matchesFilters(item) {
      if (item.status === "hidden" || item.status === "archived") return false;
      if (!matchesChannel(item)) return false;
      if (state.sector !== "all" && itemSector(item) !== state.sector) return false;
      if (state.source !== "all" && itemSource(item) !== state.source) return false;
      if (state.query && !searchableText(item).includes(normalizeText(state.query))) return false;
      return true;
    }

    function compareItems(left, right) {
      const diff = timeMs(right.publishedAt || right.createdAt) - timeMs(left.publishedAt || left.createdAt);
      return state.sort === "oldest" ? -diff : diff;
    }

    function renderOptions(select, values, allLabel, selected) {
      select.innerHTML = [`<option value="all">${escapeHtml(allLabel)}</option>`]
        .concat(values.map((value) => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`))
        .join("");
      select.value = selected;
    }

    function refreshFilterOptions() {
      const channelItems = state.items.filter(matchesChannel);
      renderOptions(els.sector, unique(channelItems.map(itemSector)).sort((a, b) => a.localeCompare(b)), "Tất cả nhóm", state.sector);
      renderOptions(els.source, unique(channelItems.map(itemSource)).sort((a, b) => a.localeCompare(b)), "Tất cả nguồn", state.source);
    }

    function filteredItems() {
      return state.items.filter(matchesFilters).sort(compareItems);
    }

    function matchesSourceBoardFilters(item) {
      if (item.status === "hidden" || item.status === "archived") return false;
      if (state.sector !== "all" && itemSector(item) !== state.sector) return false;
      if (state.source !== "all" && itemSource(item) !== state.source) return false;
      if (state.query && !searchableText(item).includes(normalizeText(state.query))) return false;
      return true;
    }

    function sourceBoardItems() {
      return state.items.filter(matchesSourceBoardFilters).sort(compareItems);
    }

    function renderTabs() {
      els.channelTabs.innerHTML = CHANNELS.map((tab) => {
        return `<button type="button" class="${state.channel === tab.id ? "active" : ""}" data-channel="${escapeHtml(tab.id)}">${escapeHtml(tab.label)}</button>`;
      }).join("");
    }

    function renderSummary(items) {
      els.summary.hidden = true;
      els.summary.innerHTML = "";
    }

    function sectorPillClass(item) {
      return isFxItem(item) ? "pill fx" : /hot|high|urgent/i.test(String(item.impactLevel || item.priorityLabel || "")) ? "pill hot" : "pill";
    }

    function tickerText(item) {
      const tickers = itemTickers(item);
      return tickers.length ? tickers.join(", ") : "";
    }

    function shortTickerText(item) {
      const text = tickerText(item);
      return text.length > 3 ? text.slice(0, 3) : text;
    }

    function titleLine(item, sourceOverride) {
      const title = displayTitle(item);
      const source = arguments.length > 1 ? sourceOverride : itemSource(item);
      return source ? `${title} ${source}` : title;
    }

    function titleLineHtml(item, sourceOverride) {
      const title = displayTitle(item);
      const source = arguments.length > 1 ? sourceOverride : itemSource(item);
      return `<span class="news-title-text">${escapeHtml(title)}</span>${source ? `<span class="news-source-inline">${escapeHtml(source)}</span>` : ""}`;
    }

    function newsRowHtml(item) {
      const url = itemUrl(item);
      const readClass = state.readLinks.has(normalizeUrl(url)) ? " read" : "";
      const titleWithSource = titleLine(item);
      const tooltip = [item.titleOriginal || item.originalTitle, displaySummary(item)].filter(Boolean).join("\n");
      const titleHtml = url
        ? `<a class="news-title${readClass}" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" data-read-url="${escapeHtml(url)}" title="${escapeHtml(tooltip || titleWithSource)}">${titleLineHtml(item)}</a>`
        : `<span class="news-title" title="${escapeHtml(tooltip || titleWithSource)}">${titleLineHtml(item)}</span>`;
      return `
        <article class="news-row">
          <div class="news-side">
            <time class="news-time">${escapeHtml(formatTime(item.publishedAt || item.createdAt))}</time>
          </div>
          <div class="news-main">
            ${titleHtml}
          </div>
          <div class="news-code-cell" title="${escapeHtml(tickerText(item))}">${escapeHtml(shortTickerText(item))}</div>
          <div class="news-meta">
            <span class="${sectorPillClass(item)}">${escapeHtml(itemSector(item))}</span>
            ${telegramActionHtml(item)}
          </div>
        </article>
      `;
    }

    function renderNews(items) {
      const visible = items.slice(0, state.renderLimit);
      els.list.className = "news-list";
      els.list.innerHTML = visible.length
        ? visible.map(newsRowHtml).join("")
        : `<div class="empty">Không có tin phù hợp bộ lọc hiện tại.</div>`;
      els.loadMore.hidden = state.view !== "news" || items.length <= state.renderLimit;
      els.loadMore.textContent = `Tải thêm (${Math.min(RENDER_STEP, Math.max(0, items.length - state.renderLimit))})`;
    }

    function renderSourceBoard(items) {
      const groups = new Map();
      items.forEach((item) => {
        const source = itemSource(item);
        if (!groups.has(source)) groups.set(source, []);
        groups.get(source).push(item);
      });
      const sourceGroups = Array.from(groups.entries())
        .map(([source, rows]) => ({source, rows: rows.sort(compareItems)}))
        .sort((a, b) => b.rows.length - a.rows.length || a.source.localeCompare(b.source));
      els.loadMore.hidden = true;
      els.list.className = "source-board";
      els.list.innerHTML = sourceGroups.length
        ? sourceGroups.map((group) => {
          const expanded = state.expandedSources.has(group.source);
          const visibleRows = expanded ? group.rows : group.rows.slice(0, SOURCE_PREVIEW_LIMIT);
          return `
          <section class="source-column">
            <div class="source-head">
              <h2>${escapeHtml(group.source)}</h2>
              <span class="source-count">${escapeHtml(String(group.rows.length))} tin</span>
            </div>
            <div class="source-list">${visibleRows.map((item) => `
              <div class="source-item">
                <div class="news-side">
                  <time class="news-time">${escapeHtml(formatTime(item.publishedAt || item.createdAt))}</time>
                </div>
                  <div class="news-main">
                    ${itemUrl(item)
                    ? `<a class="news-title${state.readLinks.has(normalizeUrl(itemUrl(item))) ? " read" : ""}" href="${escapeHtml(itemUrl(item))}" target="_blank" rel="noopener noreferrer" data-read-url="${escapeHtml(itemUrl(item))}" title="${escapeHtml(titleLine(item, ""))}">${titleLineHtml(item, "")}</a>`
                    : `<span class="news-title" title="${escapeHtml(titleLine(item, ""))}">${titleLineHtml(item, "")}</span>`}
                </div>
                <div class="news-code-cell" title="${escapeHtml(tickerText(item))}">${escapeHtml(shortTickerText(item))}</div>
                <div class="news-meta">${telegramActionHtml(item)}</div>
              </div>
            `).join("")}</div>
            ${group.rows.length > SOURCE_PREVIEW_LIMIT
              ? `<button class="source-more" type="button" data-source-toggle="${escapeHtml(group.source)}">${expanded ? "Thu gọn" : `Xem thêm ${group.rows.length - SOURCE_PREVIEW_LIMIT} tin`}</button>`
              : ""}
          </section>
        `}).join("")
        : `<div class="empty">Không có tin phù hợp bộ lọc hiện tại.</div>`
    }

    function render() {
      state.items = dedupeDisplayItems(state.rawItems.map(normalizeItem));
      refreshFilterOptions();
      renderTabs();
      const items = filteredItems();
      renderSummary(items);
      els.status.textContent = `Đã tải ${state.items.length} tin. Đang lọc ${items.length} tin.`;
      els.viewNews.classList.toggle("active", state.view === "news");
      els.viewSource.classList.toggle("active", state.view === "source");
      if (state.view === "source") renderSourceBoard(sourceBoardItems());
      else renderNews(items);
      els.clearSearch.hidden = !state.query;
    }

    async function loadAdminOverrides(options = {}) {
      const snapshot = await db.collection("market_admin_overrides").where("active", "==", true).limit(500).get(options);
      state.adminOverrides = snapshot.docs.map((doc) => ({id: doc.id, ...doc.data()}));
    }

    async function loadManualNews(options = {}) {
      const snapshot = await db.collection("manual_news")
        .where("status", "==", "published")
        .orderBy("publishedAt", "desc")
        .limit(100)
        .get(options);
      return snapshot.docs.map((doc) => ({id: doc.id, collectionName: "manual_news", isManual: true, ...doc.data()}));
    }

    async function loadNews(options = {}) {
      if (!db) return;
      els.status.textContent = "Đang tải dữ liệu...";
      els.refresh.disabled = true;
      try {
        const [newsSnapshot, manualItems] = await Promise.all([
          db.collection("news").orderBy("publishedAt", "desc").limit(PAGE_SIZE).get(options),
          loadManualNews(options).catch(() => []),
        ]);
        state.rawItems = [
          ...newsSnapshot.docs.map((doc) => ({id: doc.id, ...doc.data()})),
          ...manualItems,
        ];
        state.renderLimit = RENDER_STEP;
        render();
      } catch (error) {
        els.status.textContent = `Lỗi tải dữ liệu: ${error.message || error}`;
      } finally {
        els.refresh.disabled = false;
      }
    }

    async function loadTelegramAdminData() {
      if (!db || !state.isAdmin) return;
      try {
        const [groupsSnapshot, logsSnapshot, autoSetting] = await Promise.all([
          db.collection("telegram_groups").orderBy("name").limit(100).get(),
          Promise.resolve({docs: []}),
          db.collection("telegram_settings").doc("auto_push").get(),
        ]);
        state.telegramGroups = groupsSnapshot.docs.map((doc) => ({id: doc.id, ...doc.data()})).filter((group) => group.active !== false);
        state.telegramLogs = logsSnapshot.docs.map((doc) => ({id: doc.id, ...doc.data()}));
        state.telegramAutoPushEnabled = autoSetting.exists && autoSetting.data()?.enabled === true;
        render();
      } catch (error) {
        els.status.textContent = `Không tải được Telegram admin data: ${error.message || error}`;
      }
    }

    function autoPushItemPayload(item) {
      return {
        newsId: item.id,
        title: displayTitle(item),
        link: itemUrl(item),
        summary: displaySummary(item),
        source: item.source || item.sourceName || item.originalSource || itemSource(item),
        sourceName: item.sourceName || item.source || itemSource(item),
        sector: item.sector || item.finalSector || item.category,
        finalSector: item.finalSector,
        category: item.category,
        categoryGroup: item.categoryGroup,
        eventType: item.eventType || item.newsType,
        newsType: item.newsType,
        impactLevel: item.impactLevel || item.priorityLabel || item.priority,
        priorityLabel: item.priorityLabel,
        impactScore: item.impactScore || item.finalScore || item.score,
        finalScore: item.finalScore,
        relatedStocks: Array.isArray(item.relatedStocks) ? item.relatedStocks : [],
        primaryTickers: Array.isArray(item.primaryTickers) ? item.primaryTickers : [],
        tickers: Array.isArray(item.tickers) ? item.tickers : [],
        watchlistStocks: Array.isArray(item.watchlistStocks) ? item.watchlistStocks : [],
      };
    }

    function openTelegramModal(newsId) {
      const item = state.items.find((row) => row.id === newsId);
      if (!item || !state.isAdmin) return;
      state.telegramDialogNewsId = newsId;
      els.telegramNews.textContent = displayTitle(item);
      els.telegramGroups.innerHTML = state.telegramGroups.length
        ? state.telegramGroups.map((group) => `
          <label class="telegram-group-option">
            <input type="checkbox" value="${escapeHtml(group.id)}">
            <span>
              <strong>${escapeHtml(group.name || "Nhóm Telegram")}</strong>
              <span>${escapeHtml(group.chatId || "")}</span>
            </span>
          </label>
        `).join("")
        : `<div class="empty">Chưa có nhóm Telegram đang bật. Vào News Ops để thêm nhóm.</div>`;
      const logs = telegramLogsForNews(newsId);
      els.telegramHistory.innerHTML = logs.length
        ? logs.slice(0, 5).map((log) => {
          const groups = Array.isArray(log.groupIds) ? log.groupIds.map(telegramGroupName).join(", ") : "";
          return `<div>${escapeHtml(log.status || "")}: ${escapeHtml(groups)} ${escapeHtml(formatTime(log.pushedAt))}</div>`;
        }).join("")
        : "Chưa có lịch sử đẩy Telegram cho tin này.";
      els.telegramConfirm.disabled = !state.telegramGroups.length;
      els.telegramSendAll.disabled = !state.telegramGroups.length;
      els.telegramModal.classList.remove("hidden");
    }

    function closeTelegramModal() {
      state.telegramDialogNewsId = "";
      els.telegramModal.classList.add("hidden");
    }

    function telegramPayload(item, groups) {
      return {
        title: displayTitle(item),
        link: itemUrl(item),
        summary: displaySummary(item),
        source: itemSource(item),
        publishedAt: formatTime(item.publishedAt || item.createdAt),
        groups: groups.map((group) => ({
          name: group.name || group.id,
          chatId: group.chatId,
        })),
      };
    }

    async function confirmTelegramPush(sendAll = false) {
      if (!state.isAdmin || !state.telegramDialogNewsId) return;
      const groupIds = sendAll
        ? state.telegramGroups.map((group) => group.id)
        : Array.from(els.telegramGroups.querySelectorAll("input:checked")).map((input) => input.value);
      if (!groupIds.length) {
        els.telegramHistory.textContent = "Chọn ít nhất một nhóm Telegram.";
        return;
      }
      const item = state.items.find((row) => row.id === state.telegramDialogNewsId);
      const groups = groupIds.map((id) => state.telegramGroups.find((group) => group.id === id)).filter(Boolean);
      if (!item || !groups.length) {
        els.telegramHistory.textContent = "Không tìm thấy tin hoặc nhóm Telegram.";
        return;
      }
      els.telegramConfirm.disabled = true;
      els.telegramSendAll.disabled = true;
      els.telegramHistory.textContent = "Đang gửi Telegram...";
      try {
        const response = await fetch("http://localhost:8787/send-telegram", {
          method: "POST",
          headers: {"content-type": "application/json"},
          body: JSON.stringify(telegramPayload(item, groups)),
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok && response.status !== 207) {
          throw new Error(result.error || `Local server HTTP ${response.status}`);
        }
        const failed = Array.isArray(result.results) ? result.results.filter((row) => row.status !== "success") : [];
        if (failed.length) {
          throw new Error(failed.map((row) => `${row.group}: ${row.error}`).join("; "));
        }
        state.telegramPushedNews.set(state.telegramDialogNewsId, groups.map((group) => group.name || group.id));
        els.telegramHistory.textContent = "Đã gửi Telegram qua local server.";
        render();
        setTimeout(closeTelegramModal, 500);
      } catch (error) {
        els.telegramHistory.textContent = `Không gửi được Telegram: ${error.message || error}. Kiểm tra npm run telegram-server.`;
      } finally {
        els.telegramConfirm.disabled = false;
        els.telegramSendAll.disabled = false;
      }
    }

    async function hardRefresh() {
      state.query = "";
      state.sector = "all";
      state.source = "all";
      state.sort = "newest";
      state.renderLimit = RENDER_STEP;
      state.readLinks = new Set();
      els.search.value = "";
      els.sector.value = "all";
      els.source.value = "all";
      els.sort.value = "newest";
      state.expandedSources.clear();
      try { localStorage.removeItem(READ_LINKS_KEY); } catch {}
      await loadAdminOverrides({source: "server"}).catch(() => { state.adminOverrides = []; });
      await loadNews({source: "server"});
    }

    function bindEvents() {
      els.channelTabs.addEventListener("click", (event) => {
        const button = event.target.closest("[data-channel]");
        if (!button) return;
        state.channel = button.dataset.channel || "market";
        state.renderLimit = RENDER_STEP;
        state.expandedSources.clear();
        render();
      });
      els.search.addEventListener("input", () => {
        state.query = els.search.value.trim();
        state.renderLimit = RENDER_STEP;
        state.expandedSources.clear();
        render();
      });
      els.clearSearch.addEventListener("click", () => {
        state.query = "";
        els.search.value = "";
        state.expandedSources.clear();
        render();
      });
      els.sector.addEventListener("change", () => {
        state.sector = els.sector.value || "all";
        state.renderLimit = RENDER_STEP;
        state.expandedSources.clear();
        render();
      });
      els.source.addEventListener("change", () => {
        state.source = els.source.value || "all";
        state.renderLimit = RENDER_STEP;
        state.expandedSources.clear();
        render();
      });
      els.sort.addEventListener("change", () => {
        state.sort = els.sort.value || "newest";
        render();
      });
      els.viewNews.addEventListener("click", () => {
        state.view = "news";
        render();
      });
      els.viewSource.addEventListener("click", () => {
        state.view = "source";
        render();
      });
      els.refresh.addEventListener("click", hardRefresh);
      els.loadMore.addEventListener("click", () => {
        state.renderLimit += RENDER_STEP;
        render();
      });
      els.list.addEventListener("click", (event) => {
        const sourceToggle = event.target.closest("[data-source-toggle]");
        if (sourceToggle) {
          const source = sourceToggle.dataset.sourceToggle || "";
          if (state.expandedSources.has(source)) state.expandedSources.delete(source);
          else state.expandedSources.add(source);
          render();
          return;
        }
        const telegramButton = event.target.closest("[data-telegram-push]");
        if (telegramButton) {
          openTelegramModal(telegramButton.dataset.telegramPush);
          return;
        }
        const link = event.target.closest("[data-read-url]");
        if (!link) return;
        markRead(link.dataset.readUrl || link.href);
        link.classList.add("read");
      });
      els.telegramCancel.addEventListener("click", closeTelegramModal);
      els.telegramConfirm.addEventListener("click", () => confirmTelegramPush());
      els.telegramSendAll.addEventListener("click", () => confirmTelegramPush(true));
      els.telegramModal.addEventListener("click", (event) => {
        if (event.target === els.telegramModal) closeTelegramModal();
      });
    }

    function start() {
      bindEvents();
      renderTabs();
      if (!window.firebase?.initializeApp) {
        els.status.textContent = "Không tải được Firebase SDK.";
        return;
      }
      firebase.initializeApp(window.NEW24H_FIREBASE_CONFIG);
      db = firebase.firestore();
      if (firebase.auth) {
        firebase.auth().onAuthStateChanged((user) => {
          currentUser = user;
          state.isAdmin = Boolean(user && ALLOWED_ADMIN_EMAILS.includes(user.email));
          if (state.isAdmin) loadTelegramAdminData();
          else {
            state.telegramGroups = [];
            state.telegramLogs = [];
            state.telegramPushedNews.clear();
            state.telegramAutoPushedNews.clear();
            state.telegramAutoPushEnabled = false;
            render();
          }
        });
      }
      loadAdminOverrides()
        .catch(() => { state.adminOverrides = []; })
        .finally(loadNews);
    }

    window.addEventListener("load", start);
  </script>
</body>
</html>
